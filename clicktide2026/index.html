function _days(dateStr){
  if(!dateStr) return null;
  var t=new Date(dateStr).getTime();
  if(isNaN(t)) return null;
  return Math.floor((Date.now()-t)/86400000);
}
function loyaltyScore(c, ctx){
  ctx=ctx||{};
  var churnDays=ctx.churnDays||60;
  var bizAvgSpend=ctx.bizAvgSpend||500;
  var bizAvgVisits=ctx.bizAvgVisits||5;
  // satisfaction_score = MOST RECENT rating. prev_satisfaction_score = the one before it.
  var sat=c.satisfaction_score||0;
  var prevSat=c.prev_satisfaction_score||0;
  var recovered=(prevSat>0&&prevSat<=2&&sat>=4); // unhappy then came back happy
  var spend=c.total_spent||0;
  var visits=c.visits||c.order_count||0;
  var sinceVisit=_days(c.last_visit_at||c.last_order_at);
  if(sinceVisit===null) sinceVisit=churnDays;

  var spendNorm=Math.min(spend/(bizAvgSpend*2),1)*100;
  var freqNorm=Math.min(visits/(bizAvgVisits*2),1)*100;
  var recencyNorm=Math.max(0,1-(sinceVisit/churnDays))*100;

  var score=Math.round(spendNorm*0.33 + recencyNorm*0.34 + freqNorm*0.33);
  // Recovered customers get a loyalty bump — they felt heard and chose to return
  if(recovered) score=Math.min(100,score+10);

  var highValue=(spendNorm>=60||freqNorm>=60);
  var slipping=(sinceVisit>=churnDays);

  // Block ONLY on the latest rating being low. A past 2 that's now a 5 does NOT block.
  if(sat>0&&sat<=2)
    return {score:score, tier:"At risk", gift:"none", reason:"low_rating", slipping:slipping, highValue:highValue, sat:sat, sinceVisit:sinceVisit, recovered:false};

  // Recovered customer (2→5): treat as a top loyalty win, send a gift to reinforce
  if(recovered&&!slipping)
    return {score:score, tier:"Recovered ★", gift:"physical", reason:"recovered", slipping:false, highValue:highValue, sat:sat, sinceVisit:sinceVisit, recovered:true};

  if(slipping){
    if(highValue) return {score:score, tier:"Win-back VIP", gift:"physical", reason:"churn_highvalue", slipping:true, highValue:true, sat:sat, sinceVisit:sinceVisit, recovered:recovered};
    if(spendNorm>=30||freqNorm>=30) return {score:score, tier:"Win-back", gift:"digital", reason:"churn_mid", slipping:true, highValue:false, sat:sat, sinceVisit:sinceVisit, recovered:recovered};
    return {score:score, tier:"Drifting", gift:"alert", reason:"churn_lowvalue", slipping:true, highValue:false, sat:sat, sinceVisit:sinceVisit, recovered:recovered};
  }

  if(score>=75) return {score:score, tier:"Loyal", gift:"physical", reason:"loyal", slipping:false, highValue:highValue, sat:sat, sinceVisit:sinceVisit, recovered:recovered};
  if(score>=50) return {score:score, tier:"Regular", gift:"digital", reason:"regular", slipping:false, highValue:highValue, sat:sat, sinceVisit:sinceVisit, recovered:recovered};
  return {score:score, tier:"Building", gift:"message", reason:"building", slipping:false, highValue:highValue, sat:sat, sinceVisit:sinceVisit, recovered:recovered};
}

// -- CSRF state helpers (stored in sessionStorage so it survives redirects) --
function savePlatformState(platform,state,extra){
  sessionStorage.setItem("ct_oauth_state",JSON.stringify({platform,state,...extra}));
}
function loadPlatformState(){
  try{return JSON.parse(sessionStorage.getItem("ct_oauth_state")||"null");}catch{return null;}
}
function clearPlatformState(){sessionStorage.removeItem("ct_oauth_state");}

// -- Generate a random state token client-side --------------------------------
function randomState(){
  const arr=new Uint8Array(24);crypto.getRandomValues(arr);
  return Array.from(arr,b=>b.toString(16).padStart(2,"0")).join("");
}

// -- Store state in Supabase then return it -----------------------------------
async function createOAuthState(platform,metadata){
  const state=randomState();
  // Only persist to DB when the user is logged in -- sessionStorage covers the unauthenticated onboard flow
  if(S?.user?.id){
    try{
      const tok=S.token;
      await fetch(`${SU}/rest/v1/oauth_states`,{
        method:"POST",
        headers:{...h(tok),Prefer:"return=minimal"},
        body:JSON.stringify({state,user_id:S.user.id,platform,metadata,expires_at:new Date(Date.now()+10*60*1000).toISOString()})
      });
    }catch(e){console.warn("Could not persist state to DB",e);}
  }
  savePlatformState(platform,state,metadata||{});
  return state;
}

      resolve();
    }

async function finishPendingMindbodyActivation(){

async function activateMindbodySite(siteId,showResult){
  const r=await fetch(`${FN}/mindbody-activate-site`,{
    method:"POST",
    headers:{"Content-Type":"application/json",Authorization:`Bearer ${S.token}`},
    body:JSON.stringify({site_id:siteId})

  const d=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(d.error||"Mindbody activation failed");
  platConn.mindbody={merchant_id:d.site_id||siteId,merchant_name:d.merchant_name||("Mindbody Site "+siteId),connected_at:new Date().toISOString()};
  if(showResult)showMindbodyActivationResult(d);

}

// -- Handle OAuth callback redirect back to this page ------------------------
// Edge functions redirect to: goclicktide.com?ct_platform=square&ct_merchant=xxx&ct_name=Yyy
// or on error: goclicktide.com?ct_error=...
(function handleOAuthReturn(){
  // Email-confirmation link return: #access_token=...&type=signup
  if(window.location.hash&&window.location.hash.indexOf("access_token=")>-1){
    try{
      var hp=new URLSearchParams(window.location.hash.substring(1));
      var at=hp.get("access_token");
      if(at){
        history.replaceState({},"",window.location.pathname);
        fetch(SU+"/auth/v1/user",{headers:{apikey:SK,Authorization:"Bearer "+at}}).then(function(r){return r.json();}).then(function(u){
          if(u&&u.id){
            S={token:at,user:u};
            localStorage.setItem("ct",at);localStorage.setItem("cu",JSON.stringify(u));
            ensureBizProfile(at,u).then(function(){
              fetch(FN+"/send-welcome-email",{method:"POST",headers:{"Content-Type":"application/json",Authorization:"Bearer "+at},body:"{}"}).catch(function(){});
            });
            obAwaitConfirm=false;scr="onboard";obS=2;R();
          }
        }).catch(function(){});
      }
    }catch(e){}
  }
  const params=new URLSearchParams(window.location.search);

  // Stripe redirect
  if(params.get("session")==="success"){
    const plan=params.get("plan")||"Growth";
    const biz=params.get("biz")||"";
    obPl=plan;obN=biz;obS=6;
    history.replaceState({},"",window.location.pathname);
    return;
  }
  if(params.get("session")==="cancelled"){
    history.replaceState({},"",window.location.pathname);
    return;
  }

  // OAuth success redirect from Edge Function
  if(params.get("ct_platform")){
    const platform=params.get("ct_platform");
    const merchantId=params.get("ct_merchant")||"";
    const merchantName=params.get("ct_name")||platform;
    const stored=loadPlatformState();
    const returnTo=sessionStorage.getItem("ct_return")||"";
    clearPlatformState();
    sessionStorage.removeItem("ct_return");
    // Set the connection in state
    platConn[platform]={merchant_id:merchantId,merchant_name:decodeURIComponent(merchantName)};
    // If we were mid-onboard, mark connected and jump to step 2 (gift)
    if(stored&&obS<=1&&!returnTo){obP=platform;obC=true;obS=3;scr="onboard";}
    else{scr="dash";dpg="settings";}
    history.replaceState({},"",window.location.pathname);
    return;
  }

  // OAuth error redirect from Edge Function
  if(params.get("ct_error")){
    const msg=decodeURIComponent(params.get("ct_error")||"Connection failed");
    clearPlatformState();
    history.replaceState({},"",window.location.pathname);
    alert("Platform connection failed: "+msg+"\n\nPlease try again.");
  }
})();

async function handleLogoUpload(input){
  if(!input.files||!input.files[0])return;
  var file=input.files[0];

  // Validate size
  var maxSize=file.name.endsWith('.svg')?20*1024*1024:100*1024*1024;
  if(file.size>maxSize){alert('File too large. Max size: '+(file.name.endsWith('.svg')?'20MB':'100MB'));return;}
  let quality;
  try{quality=await analyzePrintUpload(file,{printWidthIn:12});}
  catch(e){alert("Could not inspect this image. Please upload a PNG, JPG, or SVG file.");input.value="";return;}
  if(!quality.ok){
    alert("Upload rejected:\n\n"+quality.rejects.join("\n")+"\n\nUse the original phone/camera image, not a screenshot or social media download.");
    input.value="";
    return;
  }

  obLogoName=file.name;
  obLogoFile=file;
  obLogoQuality=quality;

  // Preview immediately
  obLogoUrl=quality.dataUrl;
  R();
  // Upload to Supabase Storage in background
  uploadLogoToStorage(file);
}

    const ext=file.name.split('.').pop();
    const path=`logos/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
    const res=await fetch(`${SU}/storage/v1/object/logos/${path}`,{
      method:'POST',
      headers:{apikey:SK,Authorization:`Bearer ${S?.token||SK}`,'Content-Type':file.type,'Cache-Control':'3600'},
      body:file
    });
    if(res.ok){
      obLogoStorageUrl=`${SU}/storage/v1/object/public/logos/${path}`;
      // Persist to the business profile so gift orders print THEIR logo
      if(S?.user?.id)setBizFields({logo_url:obLogoStorageUrl});

      var logoZone=document.getElementById('logoDropZone');
      if(!logoZone)R(); // full re-render if not found

// -- Print quality validation -------------------------------------------------
function qualityTier(score){
  if(score>=90)return {label:"Excellent",color:"#22C55E"};
  if(score>=80)return {label:"Good",color:"#4DA6FF"};
  if(score>=70)return {label:"Acceptable",color:"#FFD166"};
  if(score>=60)return {label:"Warning",color:"#FF9F4D"};
  return {label:"Reject",color:"#FF4D6D"};
}
function qualityBadName(name){
  const n=String(name||"").toLowerCase();
  return /(screenshot|screen shot|screen[-_ ]?capture|facebook|instagram|messenger|whatsapp|tiktok|profile|avatar|thumbnail|download)/.test(n);
}
function imageLoadFromDataUrl(src){
  return new Promise(function(resolve,reject){
    const img=new Image();
    img.onload=function(){resolve(img);};
    img.onerror=reject;
    img.src=src;
  });
}
function readFileAsDataURL(file){
  return new Promise(function(resolve,reject){
    const reader=new FileReader();
    reader.onload=function(e){resolve(e.target.result);};
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}
function canvasMetrics(img){
  const max=520,scale=Math.min(1,max/Math.max(img.naturalWidth,img.naturalHeight));
  const w=Math.max(1,Math.round(img.naturalWidth*scale)),h=Math.max(1,Math.round(img.naturalHeight*scale));
  const canvas=document.createElement("canvas");
  canvas.width=w;canvas.height=h;
  const ctx=canvas.getContext("2d",{willReadFrequently:true});
  ctx.drawImage(img,0,0,w,h);
  const data=ctx.getImageData(0,0,w,h).data;
  const gray=new Float32Array(w*h);
  let sum=0,dark=0,bright=0;
  for(let i=0,p=0;i<data.length;i+=4,p++){
    const y=.299*data[i]+.587*data[i+1]+.114*data[i+2];
    gray[p]=y;sum+=y;if(y<45)dark++;if(y>235)bright++;
  }
  const avg=sum/(w*h);
  let lapSum=0,lapSq=0,count=0;
  for(let y=1;y<h-1;y++){
    for(let x=1;x<w-1;x++){
      const p=y*w+x;
      const v=(gray[p-w]+gray[p-1]-4*gray[p]+gray[p+1]+gray[p+w]);
      lapSum+=v;lapSq+=v*v;count++;
    }
  }
  const lapMean=lapSum/Math.max(1,count);
  const sharpness=Math.max(0,(lapSq/Math.max(1,count))-lapMean*lapMean);
  return {avg:avg,sharpness:sharpness,darkPct:dark/(w*h),brightPct:bright/(w*h),canvas:canvas};
}
async function detectFaces(img,canvas){
  if(!("FaceDetector" in window))return {available:false,faces:[]};
  try{
    const detector=new FaceDetector({fastMode:true,maxDetectedFaces:4});
    const faces=await detector.detect(canvas||img);
    return {available:true,faces:faces||[]};
  }catch(e){return {available:false,faces:[]};}
}
async function analyzePrintUpload(file,opts){
  opts=opts||{};
  const printWidth=Number(opts.printWidthIn||12);
  const isSvg=/\.svg$/i.test(file.name)||file.type==="image/svg+xml";
  if(isSvg){
    return {ok:true,vector:true,score:100,tier:qualityTier(100),width:null,height:null,ppi:null,checks:[
      {label:"Resolution",value:"Vector artwork",ok:true},
      {label:"Sharpness",value:"Always scales cleanly",ok:true},
      {label:"Compression",value:"No raster compression",ok:true}
    ],warnings:[],rejects:[]};
  }
  if(!/^image\/(png|jpeg)$/.test(file.type)&&!/\.(png|jpe?g)$/i.test(file.name)){
    return {ok:false,score:0,tier:qualityTier(0),warnings:[],rejects:["Only PNG or JPG images are accepted for print photos."]};
  }
  const rejects=[],warnings=[];
  if(qualityBadName(file.name))rejects.push("This looks like a screenshot, social download, profile image, thumbnail, or downloaded file. Upload the original phone/camera photo instead.");
  const dataUrl=await readFileAsDataURL(file);
  const img=await imageLoadFromDataUrl(dataUrl);
  const w=img.naturalWidth,h=img.naturalHeight,short=Math.min(w,h),long=Math.max(w,h);
  const ppi=Math.round(short/printWidth);
  if(short<1200)rejects.push("Image is below 1200px on the shortest side.");
  else if(short<2000)warnings.push("Image is under the 2000px minimum target. It may print soft on larger gifts.");
  if(ppi<100)rejects.push("Effective PPI is below 100 at the selected print size.");
  else if(ppi<150)warnings.push("Effective PPI is below 150. Use a higher-resolution original if possible.");
  const metrics=canvasMetrics(img);
  const bpp=file.size/(w*h);
  let resolutionScore=short>=3000?40:short>=2000?34:short>=1200?22:0;
  let sharpnessScore=metrics.sharpness>=500?25:metrics.sharpness>=220?21:metrics.sharpness>=100?16:metrics.sharpness>=50?9:3;
  let lightingScore=(metrics.avg>=90&&metrics.avg<=205&&metrics.darkPct<.32&&metrics.brightPct<.25)?10:(metrics.avg>=65&&metrics.avg<=230?7:3);
  let compressionScore=bpp>=.18?10:bpp>=.08?7:bpp>=.045?5:2;
  if(metrics.sharpness<50)warnings.push("The image appears blurry or out of focus.");
  if(lightingScore<7)warnings.push("Lighting looks too dark, too bright, or heavily shadowed.");
  if(compressionScore<5)warnings.push("The file looks heavily compressed. Avoid Facebook, Instagram, Messenger, WhatsApp, or TikTok downloads.");
  const faceInfo=await detectFaces(img,metrics.canvas);
  let faceScore=10,faceValue=faceInfo.available?"No face detected":"Browser face check unavailable";
  if(faceInfo.available&&faceInfo.faces.length){
    const largest=faceInfo.faces.reduce(function(a,b){return (b.boundingBox.width*b.boundingBox.height)>(a.boundingBox.width*a.boundingBox.height)?b:a;},faceInfo.faces[0]);
    const pct=(largest.boundingBox.width*largest.boundingBox.height)/(metrics.canvas.width*metrics.canvas.height);
    faceValue=Math.round(pct*100)+"% of image";
    if(pct>=.10&&pct<=.70)faceScore=15;
    else if(pct<.10){faceScore=4;warnings.push("Face is too small. For portraits, the full face should be clearly visible.");}
    else {faceScore=8;warnings.push("Face may be cropped too tightly. Leave space around the subject.");}
  }
  const score=Math.max(0,Math.min(100,Math.round(resolutionScore+sharpnessScore+faceScore+lightingScore+compressionScore-(rejects.length?35:0))));
  const tier=qualityTier(score);
  if(score<60)rejects.push("Print Quality Score is below 60.");
  else if(score<70)warnings.push("Print Quality Score is below 70. Ask for a better image before fulfillment.");
  return {ok:rejects.length===0,score:score,tier:tier,width:w,height:h,ppi:ppi,shortSide:short,longSide:long,sharpness:Math.round(metrics.sharpness),lighting:Math.round(metrics.avg),compression:bpp,faceValue:faceValue,warnings:warnings,rejects:rejects,dataUrl:dataUrl,checks:[
    {label:"Resolution",value:w+" x "+h+" px",ok:short>=2000},
    {label:"Effective PPI",value:ppi+" PPI at "+printWidth+" in",ok:ppi>=150},
    {label:"Sharpness",value:Math.round(metrics.sharpness),ok:metrics.sharpness>=100},
    {label:"Face visibility",value:faceValue,ok:faceScore>=10},
    {label:"Lighting",value:Math.round(metrics.avg),ok:lightingScore>=7},
    {label:"Compression",value:bpp.toFixed(3)+" bytes/pixel",ok:compressionScore>=5}
  ]};
}
function qualityHtml(q){
  if(!q)return "";
  const tier=q.tier||qualityTier(q.score||0);
  const rows=(q.checks||[]).map(function(c){return "<div style='display:flex;justify-content:space-between;gap:10px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.06)'><span style='color:rgba(240,244,255,.48)'>"+giftEsc(c.label)+"</span><strong style='color:"+(c.ok?"#22C55E":"#FFD166")+"'>"+giftEsc(String(c.value))+"</strong></div>";}).join("");
  const issues=(q.rejects&&q.rejects.length?q.rejects:q.warnings||[]).slice(0,3).map(function(x){return "<li>"+giftEsc(x)+"</li>";}).join("");
  return "<div style='border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:12px;margin:10px 0;background:rgba(255,255,255,.03)'><div style='display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px'><div style='font-size:12px;font-weight:900'>Print Quality Score</div><div style='font-size:18px;font-weight:900;color:"+tier.color+"'>"+(q.score||0)+" <span style='font-size:11px'>"+tier.label+"</span></div></div>"+rows+(issues?"<ul style='margin:10px 0 0;padding-left:17px;font-size:11px;color:"+(q.rejects&&q.rejects.length?"#FF9F4D":"rgba(240,244,255,.58)")+";line-height:1.6'>"+issues+"</ul>":"")+"</div>";
}

  return {

async function handleBrandLogoUpload(input){
  const file=input.files&&input.files[0];if(!file)return;
  if(!/\.(png|jpe?g|svg)$/i.test(file.name)){alert("Upload a PNG, JPG, or SVG logo.");return;}
  if(file.size>(/\.svg$/i.test(file.name)?20:15)*1024*1024){alert("For this browser proof, use a file under 15MB for PNG/JPG or 20MB for SVG. Keep the full-resolution original for fulfillment.");input.value="";return;}
  let quality;
  try{quality=await analyzePrintUpload(file,{printWidthIn:12});}
  catch(e){alert("Could not inspect this image. Please upload a PNG, JPG, or SVG file.");input.value="";return;}
  if(!quality.ok){
    alert("Upload rejected:\n\n"+quality.rejects.join("\n")+"\n\nUse the original phone/camera file, not a screenshot, profile picture, or social media download.");
    input.value="";
    return;
  }
  brandLogoName=file.name;
  brandLogoQuality=quality;
  const isSvg=/\.svg$/i.test(file.name)||file.type==="image/svg+xml";
  brandLogoUrl=isSvg?await readFileAsDataURL(file):quality.dataUrl;
  persistBrandLogo();
  dLoad();
}

function handleCSV(input){
  if(!input.files||!input.files[0])return;
  var file=input.files[0];
  var reader=new FileReader();
  reader.onload=function(e){
    var lines=e.target.result.split('\n');
    var headers=lines[0].split(',').map(function(h){return h.trim().toLowerCase();});
    var nameIdx=headers.findIndex(function(h){return h.includes('name');});
    var emailIdx=headers.findIndex(function(h){return h.includes('email');});
    if(nameIdx===-1||emailIdx===-1){alert('CSV must have a Name and Email column.');return;}
    var imported=0;
    var tok=S?S.token:SK;
    var promises=[];
    for(var i=1;i<Math.min(lines.length,501);i++){
      var cols=lines[i].split(',');
      if(cols[emailIdx]&&cols[emailIdx].includes('@')){
        promises.push(db.ins('customers',{name:(cols[nameIdx]||'').trim(),email:(cols[emailIdx]||'').trim(),status:'active',user_id:myId()},tok));
        imported++;
      }
    }
    Promise.all(promises).then(function(){
      alert('Successfully imported '+imported+' customers!');
      obImport='platform';
      R();
    }).catch(function(e){alert('Import error: '+e.message);});
  };
  reader.readAsText(file);
}

  var base=riskDays<=21?.24:riskDays<=35?.18:riskDays<=65?.12:riskDays<=95?.08:.06;

async function saveDCol(btn){
  var a=(document.getElementById("dColInp")?.value||"").trim();
  var bg=(document.getElementById("dBgInp")?.value||"").trim();
  if(!/^#[0-9a-fA-F]{6}$/.test(a)||!/^#[0-9a-fA-F]{6}$/.test(bg)){alert("Pick your colors first");return;}
  if(btn){btn.disabled=true;btn.textContent="Saving...";}
  try{
    var r=await fetch(SU+"/rest/v1/clicktide?user_id=eq."+myId(),{method:"PATCH",headers:Object.assign({},h(S?.token||SK),{Prefer:"return=minimal"}),body:JSON.stringify({dashboard_color:a,dashboard_bg:bg})});
    if(!r.ok)throw new Error("Could not save");
    if(bizLock){bizLock.dashboard_color=a;bizLock.dashboard_bg=bg;}
  }catch(e){alert(e.message);}
  dLoad();
}
async function saveGRev(btn){
  var v=(document.getElementById("gRevInp")?.value||"").trim();
  if(v&&!/^https?:\/\//i.test(v)){alert("Please paste a full link starting with https://");return;}
  if(btn){btn.disabled=true;btn.textContent="Saving...";}
  try{
    var r=await fetch(SU+"/rest/v1/clicktide?user_id=eq."+myId(),{method:"PATCH",headers:Object.assign({},h(S?.token||SK),{Prefer:"return=minimal"}),body:JSON.stringify({google_review_url:v||null})});
    if(!r.ok)throw new Error("Could not save");
    if(bizLock)bizLock.google_review_url=v;
    if(btn){btn.textContent="Saved ✓";setTimeout(function(){if(btn){btn.disabled=false;btn.textContent="Save";}},1500);}
  }catch(e){alert(e.message);if(btn){btn.disabled=false;btn.textContent="Save";}}
}
function ctShade(hex,amt){var h=hex.replace("#","");var r=Math.min(255,Math.max(0,parseInt(h.substr(0,2),16)+amt)),g=Math.min(255,Math.max(0,parseInt(h.substr(2,2),16)+amt)),b=Math.min(255,Math.max(0,parseInt(h.substr(4,2),16)+amt));return "#"+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);}
function ctTheme(){
  try{
    if(!bizLock||String(bizLock.plan||"").toLowerCase()!=="scale")return "";
    var s="";
    var a=bizLock.dashboard_color||"";
    if(/^#[0-9a-fA-F]{6}$/.test(a))s+=".btn-gold{background:"+a+" !important}.ni.on{color:"+a+" !important}";
    var bg=bizLock.dashboard_bg||"";
    if(/^#[0-9a-fA-F]{6}$/.test(bg)&&bg.toLowerCase()!=="#080d18"){
      var p=ctShade(bg,10),inp=ctShade(bg,22);
      s+="body{background:"+bg+" !important}.sb,.dc,.sc{background:"+p+" !important}.fi{background:"+inp+" !important}";
    }
    return s?"<style>"+s+"</style>":"";
  }catch(e){return "";}
}
async function doGiftAuto(next){
  try{
    var r=await fetch(SU+"/rest/v1/clicktide?user_id=eq."+myId(),{method:"PATCH",headers:Object.assign({},h(S?.token||SK),{Prefer:"return=minimal"}),body:JSON.stringify({gift_auto_send:next})});
    if(!r.ok)throw new Error("Could not save the setting");
    if(bizLock)bizLock.gift_auto_send=next;
  }catch(e){alert(e.message);}
  dLoad();
}

async function tGiftAuto(btn){

async function sendPhysicalGift({campaignId,customerName,customerEmail,address,giftIndex,gift:giftInput,logoUrl,businessName,giftCost}){

  const cost=Number(giftCost||gift.cost||gift.p||gift.estimated_cost||0);

  const res=await fetch(`${FN}/printify-fulfill-gift`,{
    method:"POST",
    headers:{"Content-Type":"application/json",apikey:SK,Authorization:`Bearer ${S?.token||SK}`},
    body:JSON.stringify({
      campaign_id:campaignId,
      user_id:myId(),
      merchant_id:myId(),
      gift_cost:cost,
      customer_name:customerName,
      customer_email:customerEmail,
      address,
      printify_product_id:gift.printify_product_id||gift.id,
      printify_variant_id:gift.printify_variant_id||gift.variant_id,
      logo_url:logoUrl||null,
      business_name:businessName||"",
      gift_name:gift.n,

async function loadMfaStatus(){

async function mfaEnroll(btn){

}
async function mfaVerify(fid,btn){
  var code=(document.getElementById("mfaCode")?.value||"").trim();
  var er=document.getElementById("mfaErr");
  if(code.length!==6){if(er){er.textContent="Enter the 6-digit code.";er.style.display="block";}return;}
  if(btn){btn.disabled=true;btn.textContent="Verifying...";}
  try{
    var c=await fetch(SU+"/auth/v1/factors/"+fid+"/challenge",{method:"POST",headers:{apikey:SK,Authorization:"Bearer "+S.token,"Content-Type":"application/json"},body:"{}"});
    var cd=await c.json();if(!c.ok)throw new Error(cd.message||"Challenge failed");
    var v=await fetch(SU+"/auth/v1/factors/"+fid+"/verify",{method:"POST",headers:{apikey:SK,Authorization:"Bearer "+S.token,"Content-Type":"application/json"},body:JSON.stringify({challenge_id:cd.id,code:code})});
    var vd=await v.json();if(!v.ok)throw new Error(vd.message||vd.msg||"Wrong code — try again");
    if(vd.access_token){S.token=vd.access_token;localStorage.setItem("ct",vd.access_token);}
    document.querySelector(".ov")?.remove();
    alert("2-step verification is ON ✓ You'll be asked for a code at every login.");
    loadMfaStatus();
  }catch(ex){if(er){er.textContent=ex.message;er.style.display="block";}if(btn){btn.disabled=false;btn.textContent="Verify & enable →";}}
}

btn.addEventListener("pointerdown",function(e){dragging=true;moved=false;sx=e.clientX;sy=e.clientY;var rc=wrap.getBoundingClientRect();ol=rc.left;ob=window.innerHeight-rc.bottom;btn.style.cursor="grabbing";try{btn.setPointerCapture(e.pointerId);}catch(err){}e.preventDefault();});
btn.addEventListener("pointermove",function(e){if(!dragging)return;var dx=e.clientX-sx,dy=e.clientY-sy;if(Math.abs(dx)>4||Math.abs(dy)>4)moved=true;var L=Math.max(8,Math.min(ol+dx,window.innerWidth-64));var B=Math.max(8,Math.min(ob-dy,window.innerHeight-64));wrap.style.transition="";wrap.style.left=L+"px";wrap.style.bottom=B+"px";if(open)placePanel();});
btn.addEventListener("pointerup",function(){if(!dragging)return;dragging=false;btn.style.cursor="grab";if(!moved){if(open){closeChat();}else{openChat();}return;}
var rc=wrap.getBoundingClientRect();var snapL=(rc.left+28<window.innerWidth/2)?16:window.innerWidth-72;wrap.style.transition="left .25s ease";wrap.style.left=snapL+"px";wrap.style.alignItems=(snapL===16)?"flex-start":"flex-end";var B=Math.round(window.innerHeight-rc.bottom);try{localStorage.setItem("ct_chat_pos",JSON.stringify({l:snapL,b:B}));}catch(err){}if(open)setTimeout(placePanel,260);setTimeout(function(){wrap.style.transition="";},300);});
panel.addEventListener("click",function(e){if(e.target&&e.target.id==="ctChatSend")send();if(e.target&&e.target.id==="ctChatClose")closeChat();});
panel.addEventListener("keydown",function(e){if(e.key==="Enter"&&e.target&&e.target.id==="ctChatIn")send();});
document.addEventListener("keydown",function(e){if(e.key==="Escape"&&open)closeChat();});
window.addEventListener("resize",function(){if(open)placePanel();});
setInterval(function(){if(!open&&!dismissed){ti=(ti+1)%TEASERS.length;var el=document.getElementById("cwTeaserTxt");if(el)el.textContent=TEASERS[ti];}},5000);
})();
</script>
</body>
</html>
