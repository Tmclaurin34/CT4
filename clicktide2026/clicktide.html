.info-dot{width:16px;height:16px;border-radius:50%;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.06);color:rgba(240,244,255,.65);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;cursor:pointer;line-height:1;position:relative;flex-shrink:0}
.info-dot:hover,.info-dot:focus{background:rgba(255,209,102,.16);border-color:rgba(255,209,102,.45);color:#FFD166;outline:none}
.info-dot::after{content:attr(data-tip);position:absolute;left:50%;bottom:calc(100% + 9px);transform:translateX(-50%);width:220px;background:#101828;border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:9px 10px;color:rgba(240,244,255,.78);font-size:11px;font-weight:500;line-height:1.5;text-transform:none;letter-spacing:0;text-align:left;box-shadow:0 12px 36px rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .15s ease;z-index:20}
.info-dot::before{content:"";position:absolute;left:50%;bottom:calc(100% + 4px);transform:translateX(-50%) rotate(45deg);width:9px;height:9px;background:#101828;border-right:1px solid rgba(255,255,255,.12);border-bottom:1px solid rgba(255,255,255,.12);opacity:0;transition:opacity .15s ease;z-index:21}
.info-dot:hover::after,.info-dot:hover::before,.info-dot:focus::after,.info-dot:focus::before{opacity:1}
.roi-pr{border-radius:12px;padding:14px;margin-bottom:16px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;text-align:center}
.rg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.rcard{border-radius:14px;padding:18px;text-align:center;border:1px solid}
.rv{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:800;margin-bottom:4px}
input[type=range]{-webkit-appearance:none;height:4px;border-radius:2px;background:rgba(255,255,255,.1);outline:none;cursor:pointer;width:100%}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;cursor:pointer;background:#FFD166}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
select option{background:#101828}
.brand-creator-grid{display:grid;grid-template-columns:230px minmax(320px,1fr) 260px;min-height:430px}
.mini3d{display:inline-block;animation:miniFloat 5.5s ease-in-out infinite}
@keyframes miniFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
/* clickable floating step cards */
.step-card{cursor:pointer;position:relative;animation:cardFloat 6s ease-in-out infinite;animation-delay:var(--d,0s);will-change:transform}
.step-card:hover{animation:none;transform:translateY(-10px) scale(1.02);box-shadow:0 26px 60px rgba(16,18,21,.16);border-color:rgba(16,18,21,.42)}
@keyframes cardFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.step-go{display:inline-flex;align-items:center;gap:6px;margin-top:14px;font-size:12.5px;font-weight:700;color:#101215;opacity:0;transform:translateX(-6px);transition:opacity .25s ease,transform .25s ease}
.step-card:hover .step-go{opacity:1;transform:none}
/* 3D floaters */
.h3d{position:absolute;pointer-events:none;z-index:0}

.h3d-l{top:330px;left:max(8px,calc(50% - 680px));width:200px;animation:float3d 9s ease-in-out infinite reverse}

@media (max-width:1180px){.h3d-r{width:210px;top:90px;right:-30px;opacity:.8}.h3d-l{display:none}}

/* artifacts: what actually goes out */
.arts{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:42px;align-items:start;text-align:left}
.art-lbl{margin-top:16px;text-align:center}
.art-lbl b{font-size:14.5px;color:#0F1115;display:block}
.art-lbl small{font-size:12px;color:#6B7280;display:block;margin-top:3px;line-height:1.5}
.aphone{width:min(250px,100%);margin:0 auto;background:#FFFFFF;border:1px solid rgb(229,231,235);border-radius:34px;padding:14px 12px 22px;box-shadow:0 24px 60px rgba(20,60,110,.14)}
.aphone .notch{width:86px;height:18px;background:#0F1115;border-radius:100px;margin:0 auto 12px}
.aphone .scr{background:#F4F7FB;border-radius:18px;padding:14px 12px;min-height:240px}
.aphone .tme{text-align:center;font-size:10px;color:#9CA3AF;margin-bottom:10px}

@keyframes bubPop{from{opacity:0;transform:translateY(10px) scale(.92)}to{opacity:1;transform:none}}
.apost{width:min(300px,100%);margin:26px auto 0;aspect-ratio:4/2.9;border-radius:10px;background:linear-gradient(165deg,#1D4E89,#0F2A4A);box-shadow:0 24px 60px rgba(20,60,110,.2);transform:rotate(-2.5deg);display:flex;align-items:center;justify-content:center;position:relative;color:#FFFFFF;text-align:center;padding:18px}
.apost .stamp{position:absolute;top:10px;right:10px;width:34px;height:40px;border:1.5px dashed rgba(255,255,255,.5);border-radius:4px}
.apost b{font-family:'Space Grotesk',sans-serif;font-size:21px;display:block;letter-spacing:-.02em}
.apost span{font-size:12px;opacity:.85;display:block;margin-top:8px}

/* two-sided postcard */
.apost-w{position:relative;width:min(320px,100%);height:250px;margin:10px auto 0}

.apost .stamp{position:absolute;top:9px;right:9px;width:28px;height:34px;border:1.5px dashed rgba(255,255,255,.5);border-radius:4px}

.apost span{font-size:11px;opacity:.85;display:block;margin-top:6px}
.apostb{position:absolute;right:0;bottom:0;width:272px;aspect-ratio:4/2.9;border-radius:10px;background:#FFFDF8;border:1px solid rgb(229,231,235);box-shadow:0 22px 50px rgba(20,60,110,.2);transform:rotate(3deg);z-index:2;display:flex;padding:13px;gap:10px}

/* retention stats */
.rstats{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin:40px 0 26px}
.rstat{background:#FFFFFF;border:1px solid rgb(229,231,235);border-radius:18px;padding:26px 20px;box-shadow:0 16px 40px rgba(20,60,110,.08)}
.rstat .rn{font-family:'Space Grotesk',sans-serif;font-size:clamp(34px,4vw,46px);font-weight:800;letter-spacing:-.04em;color:#0F1115}
.rstat .rl{font-size:13px;color:#374151;line-height:1.55;margin-top:8px}
.rstat .rs{font-size:10.5px;color:#9CA3AF;margin-top:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.rchart{background:#FFFFFF;border:1px solid rgb(229,231,235);border-radius:18px;padding:26px 28px;box-shadow:0 16px 40px rgba(20,60,110,.08);max-width:760px;margin:0 auto;text-align:left}
.rchart h4{font-size:14.5px;color:#0F1115;margin-bottom:18px;font-weight:700}
.rrow{margin-bottom:16px}
.rrow .rt{display:flex;justify-content:space-between;font-size:12.5px;color:#374151;margin-bottom:6px;font-weight:600}
.rtrack{height:32px;background:rgb(238,241,246);border-radius:100px;box-shadow:inset 0 2px 6px rgba(16,18,21,.1);overflow:visible}
.sbar{position:relative;height:100%;width:0;border-radius:100px;transition:width 1.3s cubic-bezier(.2,.7,.3,1) .35s;display:flex;align-items:center;justify-content:flex-end;padding-right:12px;color:#FFFFFF;font-size:11.5px;font-weight:800}
.sbar::before{content:"";position:absolute;inset:0;border-radius:inherit;background:repeating-linear-gradient(45deg,rgba(255,255,255,.28) 0 10px,transparent 10px 20px);animation:stripeMove .9s linear infinite}
.sbar::after{content:"";position:absolute;inset:0;border-radius:inherit;background:linear-gradient(180deg,rgba(255,255,255,.5),rgba(255,255,255,0) 48%);pointer-events:none}
@keyframes stripeMove{to{background-position:28.3px 0}}
.sled{position:absolute;right:-4px;top:50%;width:17px;height:17px;margin-top:-8.5px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#FFFFFF,rgba(255,255,255,.4) 75%);box-shadow:0 0 16px 6px rgba(255,255,255,.55);animation:ledPulse 1.5s ease-in-out infinite;z-index:3}
@keyframes ledPulse{0%,100%{transform:scale(.8)}50%{transform:scale(1.2)}}
@media (prefers-reduced-motion: reduce){.sbar::before,.sled{animation:none}}
.rv-in .sbar{width:var(--w)}
.rsrc{font-size:10.5px;color:#9CA3AF;margin-top:4px}
@media (max-width:900px){.rstats{grid-template-columns:1fr}}

/* mobile vertical flow */
.pflow-m{display:none}
.pnm{display:flex;flex-direction:column;align-items:center}
.pnm b{font-size:13.5px;font-weight:700;color:#0F1115;font-family:Inter,sans-serif}

.vline{width:2px;height:34px;margin:6px 0;background:repeating-linear-gradient(180deg,#9CC6F2 0 5px,transparent 5px 12px);position:relative}
.vline::after{content:"";position:absolute;left:50%;top:-4px;width:9px;height:9px;margin-left:-4.5px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#FFF3CD,#E9B949);box-shadow:0 0 10px 3px rgba(233,185,73,.55);animation:vorb 2.4s linear infinite}

/* 3D process stage */
.pstage{position:relative;width:1000px;height:285px;margin:0 auto;transform-origin:left top}
.pnode{position:absolute;display:flex;flex-direction:column;align-items:center;transform:translate(-50%,-46%);animation:nodeBob 5.6s ease-in-out infinite;animation-delay:var(--nb,0s);will-change:transform}
@keyframes nodeBob{0%,100%{transform:translate(-50%,-46%) translateY(0)}50%{transform:translate(-50%,-46%) translateY(-7px)}}
.pnode b{font-size:14px;font-weight:700;color:#0F1115;margin-top:2px;white-space:nowrap;font-family:Inter,sans-serif}
.pnode small{font-size:11px;color:#6B7280;white-space:nowrap}
.pring2{position:absolute;top:6px;left:50%;width:86px;height:74px;margin-left:-43px;border:2px solid rgba(233,185,73,.75);border-radius:24px;opacity:0;animation:nring2 6.4s ease-out infinite;animation-delay:var(--rd,0s);pointer-events:none}
@keyframes nring2{0%{opacity:0;transform:scale(.6)}6%{opacity:.85}16%{opacity:0;transform:scale(1.35)}100%{opacity:0;transform:scale(1.35)}}
.orb{position:absolute;left:0;top:0;width:13px;height:13px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#FFF3CD,#E9B949);box-shadow:0 0 16px 5px rgba(233,185,73,.55);opacity:0;will-change:offset-distance}
.oA{animation:orbA 6.4s linear infinite}
.oB{animation:orbB 6.4s linear infinite}
.oC{animation:orbC 6.4s linear infinite}
@keyframes orbA{0%{offset-distance:0%;opacity:0}2%{opacity:1}15%{offset-distance:100%;opacity:1}17%{offset-distance:100%;opacity:0}100%{offset-distance:100%;opacity:0}}
@keyframes orbB{0%,17%{offset-distance:0%;opacity:0}19%{opacity:1}32%{offset-distance:100%;opacity:1}34%{offset-distance:100%;opacity:0}100%{offset-distance:100%;opacity:0}}
@keyframes orbC{0%,36%{offset-distance:0%;opacity:0}38%{opacity:1}51%{offset-distance:100%;opacity:1}53%{offset-distance:100%;opacity:0}100%{offset-distance:100%;opacity:0}}
.espin{position:absolute;left:300px;top:111px;width:104px;height:104px;margin:-52px 0 0 -52px;border:2px dashed rgba(233,185,73,.5);border-radius:50%;animation:espinR 10s linear infinite;pointer-events:none}
@keyframes espinR{to{transform:rotate(360deg)}}
.ckd{animation:ckdraw2 6.4s linear infinite}
@keyframes ckdraw2{0%,52%{stroke-dashoffset:1}62%,90%{stroke-dashoffset:0}100%{stroke-dashoffset:1}}
@media (prefers-reduced-motion: reduce){.pnode,.orb,.espin,.pring2{animation:none}.orb{display:none}.ckd{animation:none;stroke-dashoffset:0}}
/* process flow (apiant-style wires) */
.pflow{max-width:980px;margin:10px auto 38px}
.pflow svg{width:100%;height:auto;display:block;overflow:visible}
.wflow{animation:wirepulse 1.1s linear infinite}
@keyframes wirepulse{to{stroke-dashoffset:-14}}
.wpk{animation:wpk 3.2s linear infinite}
@keyframes wpk{0%{stroke-dashoffset:400}100%{stroke-dashoffset:-30}}
.pring{transform-box:fill-box;transform-origin:center;animation:nring 6.4s ease-out infinite;opacity:0}
@keyframes nring{0%{opacity:0;transform:scale(.55)}6%{opacity:.8}16%{opacity:0;transform:scale(1.35)}100%{opacity:0;transform:scale(1.35)}}
.ckd{animation:ckdraw 6.4s linear infinite}
@keyframes ckdraw{0%,58%{stroke-dashoffset:1}70%,92%{stroke-dashoffset:0}100%{stroke-dashoffset:1}}
@media (max-width:700px){.pflow{display:none}}
@media (prefers-reduced-motion: reduce){.wflow,.wpk,.pring,.ckd{animation:none}.ckd{stroke-dashoffset:0}}
/* scroll reveal */
.lt .rv{opacity:0;transform:translateY(26px);transition:opacity .7s cubic-bezier(.2,.7,.3,1),transform .7s cubic-bezier(.2,.7,.3,1)}
.lt .rv.rv-in{opacity:1;transform:none}
@media (prefers-reduced-motion: reduce){.lt .rv{opacity:1;transform:none;transition:none}}
@media (max-width:820px){.lt .rv{opacity:1!important;transform:none!important;transition:none!important}}
.plogo{width:20px;height:20px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;color:#FFFFFF;font-size:11px;font-weight:800;margin-right:8px;vertical-align:-5px;font-family:Inter,sans-serif}
/* hero engagement button */
.lt .btn-hero{position:relative;overflow:hidden;background:linear-gradient(165deg,#FFDE8A,#F0B43C);color:#101215;font-weight:800;font-size:15px;padding:15px 30px;border-radius:14px;border:none;cursor:pointer;font-family:Inter,sans-serif;display:inline-flex;align-items:center;gap:9px;box-shadow:0 12px 30px rgba(233,169,59,.45);animation:heroGlow 2.6s ease-in-out infinite;transition:transform .18s ease}
.lt .btn-hero:hover{animation:none;transform:translateY(-3px) scale(1.04);box-shadow:0 22px 50px rgba(233,169,59,.65);opacity:1}
.lt .btn-hero::after{content:"";position:absolute;top:0;left:-80%;width:55%;height:100%;background:linear-gradient(100deg,transparent 0%,rgba(255,255,255,.55) 50%,transparent 100%);transform:skewX(-20deg);animation:btnShine 3.2s ease-in-out infinite;pointer-events:none}
@keyframes heroGlow{0%,100%{box-shadow:0 12px 30px rgba(233,169,59,.4)}50%{box-shadow:0 16px 44px rgba(233,169,59,.7)}}
@media (prefers-reduced-motion: reduce){.lt .btn-hero,.lt .btn-hero::after{animation:none}}
/* faq accordion */
.faq{max-width:760px;margin:40px auto 0;text-align:left}
.faq details{background:#FFFFFF;border:1px solid rgb(229,231,235);border-radius:14px;margin-bottom:10px;box-shadow:0 10px 28px rgba(20,60,110,.06)}
.faq summary{cursor:pointer;padding:16px 20px;font-weight:700;font-size:14.5px;color:#0F1115;list-style:none;display:flex;justify-content:space-between;align-items:center;gap:14px}
.faq summary::-webkit-details-marker{display:none}
.faq summary::after{content:"+";font-size:20px;font-weight:600;color:#2E7CD6;flex-shrink:0;transition:transform .2s ease}
.faq details[open] summary::after{transform:rotate(45deg)}
.faq details>div{padding:0 20px 18px;font-size:13.5px;color:#374151;line-height:1.75}
/* landing campaign library showcase */
.libcol{background:#FFFFFF;border:1px solid rgb(229,231,235);border-radius:18px;padding:24px;text-align:left;box-shadow:0 16px 40px rgba(20,60,110,.08)}
.libhead{display:inline-flex;align-items:center;gap:8px;border-radius:100px;padding:7px 16px;font-size:11.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px}
.librow{display:flex;align-items:flex-start;gap:11px;padding:10px 0;border-bottom:1px solid rgb(243,244,247)}
.librow:last-of-type{border-bottom:none}
.librow svg{flex-shrink:0;margin-top:1px}
.librow b{font-size:13.5px;color:#0F1115;display:block}
.librow small{font-size:12px;color:#6B7280;line-height:1.5;display:block;margin-top:1px}
@media (max-width:900px){.libcol{padding:18px}}
/* gift philosophy quote */
.gquote{max-width:660px;margin:30px auto 38px;background:#FFFFFF;border:1px solid rgb(229,231,235);border-left:4px solid #E9B949;border-radius:14px;padding:24px 30px;text-align:left;box-shadow:0 14px 36px rgba(20,60,110,.08)}
.gquote p{font-family:'Space Grotesk',sans-serif;font-size:clamp(17px,2vw,21px);font-weight:700;color:#0F1115;line-height:1.5;margin:0}
.gquote p em{font-style:normal;color:#2E7CD6}
.gquote small{display:block;margin-top:10px;font-size:12.5px;color:#6B7280;line-height:1.6}
/* gift philosophy quote end */
/* buttons that pop */
.lt .btn-gold{position:relative;overflow:hidden;box-shadow:0 10px 26px rgba(13,32,52,.32),inset 0 1px 0 rgba(255,255,255,.16);transition:transform .18s ease,box-shadow .18s ease}
.lt .btn-gold:hover{opacity:1;transform:translateY(-2px) scale(1.02);box-shadow:0 18px 40px rgba(13,32,52,.45)}
.lt .btn-gold::after{content:"";position:absolute;top:0;left:-80%;width:55%;height:100%;background:linear-gradient(100deg,transparent 0%,rgba(255,255,255,.38) 50%,transparent 100%);transform:skewX(-20deg);animation:btnShine 4.6s ease-in-out infinite;pointer-events:none}
@keyframes btnShine{0%,62%{left:-80%}82%,100%{left:135%}}
.lt .btn-ghost{background:#FFFFFF;border:1.5px solid rgba(13,32,52,.35);color:#0F1115;font-weight:700;transition:all .18s ease}
.lt .btn-ghost:hover{opacity:1;background:#101215;color:#FFFFFF;transform:translateY(-2px);box-shadow:0 12px 30px rgba(13,32,52,.3)}
.lt .btn-outline{transition:all .18s ease}
.lt .btn-outline:hover{opacity:1;border-color:rgba(13,32,52,.5);transform:translateY(-1px)}
/* floating product cards (animated background) */
.px{position:absolute;z-index:3;pointer-events:none;will-change:transform}
.fcard{background:#FFFFFF;border:1px solid rgb(229,231,235);border-radius:14px;box-shadow:0 18px 50px rgba(20,60,110,.2);padding:12px 15px;display:flex;align-items:center;gap:10px;white-space:nowrap}
.fcard .av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#FFFFFF;flex-shrink:0}
.fcard b{font-size:12.5px;color:#0F1115;display:block;line-height:1.3}
.fcard small{font-size:10.5px;color:#6B7280;display:block;line-height:1.4}
.fc1{animation:fcA 9s ease-in-out infinite}
.fc2{animation:fcB 11s ease-in-out infinite}
.fc3{animation:fcC 10s ease-in-out infinite}
@keyframes fcA{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-14px) rotate(-4deg)}}
@keyframes fcB{0%,100%{transform:translateY(0) rotate(5deg)}50%{transform:translateY(-16px) rotate(3deg)}}
@keyframes fcC{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-12px) rotate(-5deg)}}
@media (max-width:900px){.px{display:none}}
/* custom icon chips */
.ic-chip{width:54px;height:54px;border-radius:14px;background:linear-gradient(rgb(238,242,246) 0%,#FFFFFF 100%);border:1px solid rgb(229,231,235);display:flex;align-items:center;justify-content:center;flex-shrink:0}

.nav-lt .btn-gold{background:linear-gradient(rgb(28,47,65) 0%,rgb(6,15,22) 100%);color:#FFFFFF;border-radius:15px;font-family:'DM Sans',sans-serif;font-weight:500}

.lt h1{font-size:clamp(42px,6.5vw,80px);line-height:.9}

/* platform marquee */
.pills-marquee{overflow:hidden;margin:44px auto 0;max-width:960px;position:relative;z-index:1;-webkit-mask-image:linear-gradient(to right,transparent 0%,#000 12%,#000 88%,transparent 100%);mask-image:linear-gradient(to right,transparent 0%,#000 12%,#000 88%,transparent 100%)}

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "Why would I send a gift to someone who stopped coming in?", "acceptedAnswer": {"@type": "Answer", "text": "You're not rewarding the leaving — you're interrupting the forgetting. Most customers don't choose to leave; life gets busy. A gift is never the first touch: a friendly check-in goes at day 14, a postcard at day 30, and a small branded gift only at day 45, when the relationship is genuinely about to die. A few dollars protecting a regular worth hundreds a year is usually the cheapest save in business."}}, {"@type": "Question", "name": "Will this annoy or spam my customers?", "acceptedAnswer": {"@type": "Answer", "text": "Your name is on every message, so the guardrails aren't optional: three win-back touches max, then it stops for good. Any visit stops all future sends automatically. Texts only go to customers with texting consent on file, STOP is honored automatically, and approve-before-send mode means nothing goes out unseen."}}, {"@type": "Question", "name": "What can Clicktide see in my register? Is it safe?", "acceptedAnswer": {"@type": "Answer", "text": "Read-only access through your platform's official connection. We can see visits and sales history so we can spot drifting — we can't move money or change your account, and you can disconnect with one click. Your data is never sold and is deleted on request."}}, {"@type": "Question", "name": "If I connect a register with a year of history, will it blast my old customers?", "acceptedAnswer": {"@type": "Answer", "text": "No. For 48 hours after your first connection nothing sends at all, and campaigns only react to activity that happens after you turn them on — imported history is a baseline, never a trigger. The one deliberate exception: win-back campaigns do read history, because finding the customers who drifted months ago is the whole point — and those flow out gradually, never as one blast."}}, {"@type": "Question", "name": "What does it really cost? Any surprise bills?", "acceptedAnswer": {"@type": "Answer", "text": "Three plans — $49, $149, $349 a month — with texts, emails, and promo-code delivery included. Physical things come from a pay-per-send wallet you control: about $1.50 a postcard, gifts from a few dollars depending on what you pick. You only pay when something physically sends, and nothing physical sends without your standing permission. No contracts, no setup fees, cancel anytime."}}, {"@type": "Question", "name": "What happens after the 30-day free trial?", "acceptedAnswer": {"@type": "Answer", "text": "Nothing is charged for 30 days, and if you cancel during the trial there's no charge at all. If you stay, your plan starts. Either way your customer data is yours — we delete it on request."}}, {"@type": "Question", "name": "How is this different from Mailchimp or email blasts?", "acceptedAnswer": {"@type": "Answer", "text": "Email tools broadcast to everybody and hope. Clicktide watches your register and acts on one person at the right moment — the day Sarah breaks her rhythm, Sarah gets a personal check-in citing her real last visit. Then it goes quiet the moment she returns. It's a win-back engine, not a newsletter."}}, {"@type": "Question", "name": "I'm B2B — a staffing agency, cleaning contracts, an agency. Does it fit?", "acceptedAnswer": {"@type": "Answer", "text": "Yes — your \"customer\" is the client company, and clients have an order rhythm just like regulars. When a client goes quiet for 45–90 days, Clicktide notices and puts your name back on their desk before a competitor settles in. Data comes in through Stripe invoicing automatically or quick manual logging — easy with dozens of clients instead of thousands of customers."}}]}</script>

// -- Session persistence. "Keep me logged in" stores the session (incl. refresh

function sessStore(){return localStorage.getItem("ct_stay")==="0"?sessionStorage:localStorage;}
function saveSession(d,stay){
  if(typeof stay==="boolean")localStorage.setItem("ct_stay",stay?"1":"0");
  var st=sessStore();
  S={token:d.access_token,user:d.user||(S&&S.user)||null};
  st.setItem("ct",d.access_token);
  if(d.user)st.setItem("cu",JSON.stringify(d.user));
  if(d.refresh_token)st.setItem("ct_rt",d.refresh_token);
  var exp=d.expires_at?Number(d.expires_at):(d.expires_in?Math.floor(Date.now()/1000)+Number(d.expires_in):0);
  if(exp)st.setItem("ct_exp",String(exp));
}
function clearSession(){S=null;[localStorage,sessionStorage].forEach(function(st){["ct","cu","ct_rt","ct_exp"].forEach(function(k){st.removeItem(k);});});}
async function refreshSession(){
  var st=sessStore(),rt=st.getItem("ct_rt");

    var r=await fetch(`${SU}/auth/v1/token?grant_type=refresh_token`,{method:"POST",headers:{apikey:SK,"Content-Type":"application/json"},body:JSON.stringify({refresh_token:rt})});

async function resumeSession(t){

    var stale=exp&&(Date.now()/1000)>exp-120;

}

function _days(dateStr){
  if(!dateStr) return null;
  var t=new Date(dateStr).getTime();
  if(isNaN(t)) return null;
  return Math.floor((Date.now()-t)/86400000);
}
function loyaltyScore(c, ctx){
  ctx=ctx||{};
  var churnDays=ctx.churnDays||60;
  var bizAvgSpend=ctx.bizAvgSpend||500;
  var bizAvgVisits=ctx.bizAvgVisits||5;
  // satisfaction_score = MOST RECENT rating. prev_satisfaction_score = the one before it.
  var sat=c.satisfaction_score||0;
  var prevSat=c.prev_satisfaction_score||0;
  var recovered=(prevSat>0&&prevSat<=2&&sat>=4); // unhappy then came back happy
  var spend=c.total_spent||0;
  var visits=c.visits||c.order_count||0;
  var sinceVisit=_days(c.last_visit_at||c.last_order_at);
  if(sinceVisit===null) sinceVisit=churnDays;

  var spendNorm=Math.min(spend/(bizAvgSpend*2),1)*100;
  var freqNorm=Math.min(visits/(bizAvgVisits*2),1)*100;
  var recencyNorm=Math.max(0,1-(sinceVisit/churnDays))*100;

  var score=Math.round(spendNorm*0.33 + recencyNorm*0.34 + freqNorm*0.33);
  // Recovered customers get a loyalty bump — they felt heard and chose to return
  if(recovered) score=Math.min(100,score+10);

  var highValue=(spendNorm>=60||freqNorm>=60);
  var slipping=(sinceVisit>=churnDays);

  // Block ONLY on the latest rating being low. A past 2 that's now a 5 does NOT block.
  if(sat>0&&sat<=2)
    return {score:score, tier:"At risk", gift:"none", reason:"low_rating", slipping:slipping, highValue:highValue, sat:sat, sinceVisit:sinceVisit, recovered:false};

  // Recovered customer (2→5): treat as a top loyalty win, send a gift to reinforce
  if(recovered&&!slipping)
    return {score:score, tier:"Recovered ★", gift:"physical", reason:"recovered", slipping:false, highValue:highValue, sat:sat, sinceVisit:sinceVisit, recovered:true};

  if(slipping){
    if(highValue) return {score:score, tier:"Win-back VIP", gift:"physical", reason:"churn_highvalue", slipping:true, highValue:true, sat:sat, sinceVisit:sinceVisit, recovered:recovered};
    if(spendNorm>=30||freqNorm>=30) return {score:score, tier:"Win-back", gift:"digital", reason:"churn_mid", slipping:true, highValue:false, sat:sat, sinceVisit:sinceVisit, recovered:recovered};
    return {score:score, tier:"Drifting", gift:"alert", reason:"churn_lowvalue", slipping:true, highValue:false, sat:sat, sinceVisit:sinceVisit, recovered:recovered};
  }

  if(score>=75) return {score:score, tier:"Loyal", gift:"physical", reason:"loyal", slipping:false, highValue:highValue, sat:sat, sinceVisit:sinceVisit, recovered:recovered};
  if(score>=50) return {score:score, tier:"Regular", gift:"digital", reason:"regular", slipping:false, highValue:highValue, sat:sat, sinceVisit:sinceVisit, recovered:recovered};
  return {score:score, tier:"Building", gift:"message", reason:"building", slipping:false, highValue:highValue, sat:sat, sinceVisit:sinceVisit, recovered:recovered};
}

}

function savePlatformState(platform,state,extra){

// -- Generate a random state token client-side --------------------------------
function randomState(){
  const arr=new Uint8Array(24);crypto.getRandomValues(arr);
  return Array.from(arr,b=>b.toString(16).padStart(2,"0")).join("");
}

// -- Store state in Supabase then return it -----------------------------------
async function createOAuthState(platform,metadata){
  const state=randomState();
  // Only persist to DB when the user is logged in -- sessionStorage covers the unauthenticated onboard flow
  if(S?.user?.id){
    try{
      const tok=S.token;
      await fetch(`${SU}/rest/v1/oauth_states`,{
        method:"POST",
        headers:{...h(tok),Prefer:"return=minimal"},
        body:JSON.stringify({state,user_id:S.user.id,platform,metadata,expires_at:new Date(Date.now()+10*60*1000).toISOString()})
      });
    }catch(e){console.warn("Could not persist state to DB",e);}
  }
  savePlatformState(platform,state,metadata||{});
  return state;
}

  const authError=params.get("error_description")||hashParams.get("error_description")||params.get("error")||hashParams.get("error")||params.get("error_code")||hashParams.get("error_code");
  if(authError&&!params.get("ct_error")){
    cleanAuthUrl();
    scr="login";R();
    const msg=(authError==="otp_expired"||authError==="access_denied")?"That link has expired or was already used. Use Forgot password on the login screen to get a fresh one.":"Email link failed: "+authError+"\n\nPlease request a new confirmation link or log in if your email is already confirmed.";
    setTimeout(function(){alert(msg);},80);
    return;
  }

  try{
    const authType=params.get("type")||hashParams.get("type")||"email";
    const hashToken=hashParams.get("access_token");
    if(hashToken){
      cleanAuthUrl();
      await finishAuthReturn(hashToken,null,authType,{refresh_token:hashParams.get("refresh_token")||"",expires_in:hashParams.get("expires_in")||"",expires_at:hashParams.get("expires_at")||""});
      return;
    }
    const tokenHash=params.get("token_hash")||hashParams.get("token_hash")||params.get("token")||hashParams.get("token");
    if(tokenHash){
      const verified=await verifyAuthTokenHash(tokenHash,authType);
      const session=verified.session||verified;
      const token=session.access_token||verified.access_token||"";
      const user=verified.user||session.user||null;
      cleanAuthUrl();
      await finishAuthReturn(token,user,authType,session);
      return;
    }
    const code=params.get("code");
    if(code&&!params.get("ct_platform")&&!params.get("session")){
      const exchanged=await exchangeAuthCode(code);
      const session=exchanged.session||exchanged;
      const token=session.access_token||exchanged.access_token||"";
      const user=exchanged.user||session.user||null;
      cleanAuthUrl();
      await finishAuthReturn(token,user,authType,session);
      return;
    }
  }catch(e){
    cleanAuthUrl();
    scr="login";R();
    setTimeout(function(){alert((e&&e.message)||"Email confirmation failed. Please request a new link or log in if your email is already confirmed.");},80);
    return;
  }

  // Stripe redirect
  if(params.get("session")==="success"){
    const plan=saveSelectedPlan(params.get("plan")||obPl);
    const biz=params.get("biz")||"";
    obCampaignSkipped=params.get("campaign")==="skip";
    obN=biz;obS=6;scr="onboard";
    saveOnboardingProgress();
    if(S?.token)setBizFields({plan,onboarding_complete:true});
    history.replaceState({},"",window.location.pathname);
    return;
  }
  if(params.get("session")==="cancelled"){
    const restored=restoreOnboardingProgress();
    if(S){const biz=await loadBiz().catch(function(){return null;});hydrateOnboardingFromBiz(biz);}
    if(!restored&&!obB&&!obCat)obS=0;
    else if(obS<2)obS=2;
    scr="onboard";
    history.replaceState({},"",window.location.pathname);
    return;
  }

  // OAuth success redirect from Edge Function
  if(params.get("ct_platform")){
    const platform=params.get("ct_platform");
    const merchantId=params.get("ct_merchant")||"";
    const merchantName=params.get("ct_name")||platform;
    const stored=loadPlatformState();
    const returnTo=sessionStorage.getItem("ct_return")||"";
    clearPlatformState();
    sessionStorage.removeItem("ct_return");
    // Set the connection in state
    platConn[platform]={merchant_id:merchantId,merchant_name:decodeURIComponent(merchantName)};
    // If we were mid-onboard, mark connected and jump to step 2 (gift)
    if(stored&&obS<=1&&!returnTo){obP=platform;obC=true;obS=3;scr="onboard";}
    else{scr="dash";dpg="settings";}
    if(scr==="onboard")saveOnboardingProgress();
    history.replaceState({},"",window.location.pathname);
    return;
  }

  // OAuth error redirect from Edge Function
  if(params.get("ct_error")){
    const msg=decodeURIComponent(params.get("ct_error")||"Connection failed");
    clearPlatformState();
    history.replaceState({},"",window.location.pathname);
    alert("Platform connection failed: "+msg+"\n\nPlease try again.");
  }
})();

o-code delivery included. Physical things come from a pay-per-send wallet you control: about $1.50 a postcard, gifts from a few dollars depending on what you pick. You only pay when something physically sends, and nothing physical sends without your standing permission. No contracts, no setup fees, cancel anytime.</div></details><details><summary>What happens after the 30-day free trial?</summary><div>Nothing is charged for 30 days, and if you cancel during the trial there\u2019s no charge at all. If you stay, your plan starts. Either way your customer data is yours \u2014 we delete it on request.</div></details><details><summary>How is this different from Mailchimp or email blasts?</summary><div>Email tools broadcast to everybody and hope. Clicktide watches your register and acts on one person at the right moment \u2014 the day Sarah breaks her rhythm, Sarah gets a personal check-in citing her real last visit. Then it goes quiet the moment she returns. It\u2019s a win-back engine, not a newsletter.</div></details><details><summary>I\u2019m B2B \u2014 a staffing agency, cleaning contracts, an agency. Does it fit?</summary><div>Yes \u2014 your \u201Ccustomer\u201D is the client company, and clients have an order rhythm just like regulars. When a client goes quiet for 45\u201390 days, Clicktide notices and puts your name back on their desk before a competitor settles in. Data comes in through Stripe invoicing automatically or quick manual logging \u2014 easy with dozens of clients instead of thousands of customers.</div></details></div>

// -- Print quality validation -------------------------------------------------
function qualityTier(score){
  if(score>=90)return {label:"Excellent",color:"#22C55E"};
  if(score>=80)return {label:"Good",color:"#4DA6FF"};
  if(score>=70)return {label:"Acceptable",color:"#FFD166"};
  if(score>=60)return {label:"Warning",color:"#FF9F4D"};
  return {label:"Reject",color:"#FF4D6D"};
}
function qualityBadName(name){
  const n=String(name||"").toLowerCase();
  return /(screenshot|screen shot|screen[-_ ]?capture|facebook|instagram|messenger|whatsapp|tiktok|profile|avatar|thumbnail|download)/.test(n);
}
function imageLoadFromDataUrl(src){
  return new Promise(function(resolve,reject){
    const img=new Image();
    img.onload=function(){resolve(img);};
    img.onerror=reject;
    img.src=src;
  });
}
function readFileAsDataURL(file){
  return new Promise(function(resolve,reject){
    const reader=new FileReader();
    reader.onload=function(e){resolve(e.target.result);};
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}
function canvasMetrics(img){
  const max=520,scale=Math.min(1,max/Math.max(img.naturalWidth,img.naturalHeight));
  const w=Math.max(1,Math.round(img.naturalWidth*scale)),h=Math.max(1,Math.round(img.naturalHeight*scale));
  const canvas=document.createElement("canvas");
  canvas.width=w;canvas.height=h;
  const ctx=canvas.getContext("2d",{willReadFrequently:true});
  ctx.drawImage(img,0,0,w,h);
  const data=ctx.getImageData(0,0,w,h).data;
  const gray=new Float32Array(w*h);
  let sum=0,dark=0,bright=0;
  for(let i=0,p=0;i<data.length;i+=4,p++){
    const y=.299*data[i]+.587*data[i+1]+.114*data[i+2];
    gray[p]=y;sum+=y;if(y<45)dark++;if(y>235)bright++;
  }
  const avg=sum/(w*h);
  let lapSum=0,lapSq=0,count=0;
  for(let y=1;y<h-1;y++){
    for(let x=1;x<w-1;x++){
      const p=y*w+x;
      const v=(gray[p-w]+gray[p-1]-4*gray[p]+gray[p+1]+gray[p+w]);
      lapSum+=v;lapSq+=v*v;count++;
    }
  }
  const lapMean=lapSum/Math.max(1,count);
  const sharpness=Math.max(0,(lapSq/Math.max(1,count))-lapMean*lapMean);
  return {avg:avg,sharpness:sharpness,darkPct:dark/(w*h),brightPct:bright/(w*h),canvas:canvas};
}
async function detectFaces(img,canvas){
  if(!("FaceDetector" in window))return {available:false,faces:[]};
  try{
    const detector=new FaceDetector({fastMode:true,maxDetectedFaces:4});
    const faces=await detector.detect(canvas||img);
    return {available:true,faces:faces||[]};
  }catch(e){return {available:false,faces:[]};}
}
async function analyzePrintUpload(file,opts){
  opts=opts||{};
  const printWidth=Number(opts.printWidthIn||12);
  const isSvg=/\.svg$/i.test(file.name)||file.type==="image/svg+xml";
  if(isSvg){
    return {ok:true,vector:true,score:100,tier:qualityTier(100),width:null,height:null,ppi:null,checks:[
      {label:"Resolution",value:"Vector artwork",ok:true},
      {label:"Sharpness",value:"Always scales cleanly",ok:true},
      {label:"Compression",value:"No raster compression",ok:true}
    ],warnings:[],rejects:[]};
  }
  if(!/^image\/(png|jpeg)$/.test(file.type)&&!/\.(png|jpe?g)$/i.test(file.name)){
    return {ok:false,score:0,tier:qualityTier(0),warnings:[],rejects:["Only PNG or JPG images are accepted for print photos."]};
  }
  const rejects=[],warnings=[];
  if(qualityBadName(file.name))rejects.push("This looks like a screenshot, social download, profile image, thumbnail, or downloaded file. Upload the original phone/camera photo instead.");
  const dataUrl=await readFileAsDataURL(file);
  const img=await imageLoadFromDataUrl(dataUrl);
  const w=img.naturalWidth,h=img.naturalHeight,short=Math.min(w,h),long=Math.max(w,h);
  const ppi=Math.round(short/printWidth);
  if(short<1200)rejects.push("Image is below 1200px on the shortest side.");
  else if(short<2000)warnings.push("Image is under the 2000px minimum target. It may print soft on larger gifts.");
  if(ppi<100)rejects.push("Effective PPI is below 100 at the selected print size.");
  else if(ppi<150)warnings.push("Effective PPI is below 150. Use a higher-resolution original if possible.");
  const metrics=canvasMetrics(img);
  const bpp=file.size/(w*h);
  let resolutionScore=short>=3000?40:short>=2000?34:short>=1200?22:0;
  let sharpnessScore=metrics.sharpness>=500?25:metrics.sharpness>=220?21:metrics.sharpness>=100?16:metrics.sharpness>=50?9:3;
  let lightingScore=(metrics.avg>=90&&metrics.avg<=205&&metrics.darkPct<.32&&metrics.brightPct<.25)?10:(metrics.avg>=65&&metrics.avg<=230?7:3);
  let compressionScore=bpp>=.18?10:bpp>=.08?7:bpp>=.045?5:2;
  if(metrics.sharpness<50)warnings.push("The image appears blurry or out of focus.");
  if(lightingScore<7)warnings.push("Lighting looks too dark, too bright, or heavily shadowed.");
  if(compressionScore<5)warnings.push("The file looks heavily compressed. Avoid Facebook, Instagram, Messenger, WhatsApp, or TikTok downloads.");
  const faceInfo=await detectFaces(img,metrics.canvas);
  let faceScore=10,faceValue=faceInfo.available?"No face detected":"Skipped";
  if(faceInfo.available&&faceInfo.faces.length){
    const largest=faceInfo.faces.reduce(function(a,b){return (b.boundingBox.width*b.boundingBox.height)>(a.boundingBox.width*a.boundingBox.height)?b:a;},faceInfo.faces[0]);
    const pct=(largest.boundingBox.width*largest.boundingBox.height)/(metrics.canvas.width*metrics.canvas.height);
    faceValue=Math.round(pct*100)+"% of image";
    if(pct>=.10&&pct<=.70)faceScore=15;
    else if(pct<.10){faceScore=4;warnings.push("Face is too small. For portraits, the full face should be clearly visible.");}
    else {faceScore=8;warnings.push("Face may be cropped too tightly. Leave space around the subject.");}
  }
  const score=Math.max(0,Math.min(100,Math.round(resolutionScore+sharpnessScore+faceScore+lightingScore+compressionScore-(rejects.length?35:0))));
  const tier=qualityTier(score);
  if(score<60)rejects.push("Print Quality Score is below 60.");
  else if(score<70)warnings.push("Print Quality Score is below 70. Ask for a better image before fulfillment.");
  return {ok:rejects.length===0,score:score,tier:tier,width:w,height:h,ppi:ppi,shortSide:short,longSide:long,sharpness:Math.round(metrics.sharpness),lighting:Math.round(metrics.avg),compression:bpp,faceValue:faceValue,warnings:warnings,rejects:rejects,dataUrl:dataUrl,checks:[
    {label:"Resolution",value:w+" x "+h+" px",ok:short>=2000},
    {label:"Effective PPI",value:ppi+" PPI at "+printWidth+" in",ok:ppi>=150},
    {label:"Sharpness",value:Math.round(metrics.sharpness),ok:metrics.sharpness>=100},
    {label:"Face visibility",value:faceValue,ok:faceScore>=10},
    {label:"Lighting",value:Math.round(metrics.avg),ok:lightingScore>=7},
    {label:"Compression",value:bpp.toFixed(3)+" bytes/pixel",ok:compressionScore>=5}
  ]};
}

  if(!mode||!q||q.vector)return "";

  return "<div style='margin-top:10px;border:1px solid rgba(77,166,255,.22);background:rgba(77,166,255,.08);border-radius:11px;padding:10px'><div style='font-size:11px;color:rgba(240,244,255,.64);line-height:1.55;margin-bottom:8px'>Clicktide can make a safer print-ready copy by upscaling, sharpening, and rechecking this artwork. Review it before fulfillment.</div><button class='btn btn-gold' style='width:100%;padding:9px 12px;font-size:12px' onclick=\"enhanceLogoForPrint('"+mode+"',this)\">Make print-ready</button></div>";

function qualityHtml(q,mode){

function canvasToBlob(canvas,type,quality){
  return new Promise(function(resolve,reject){
    canvas.toBlob(function(blob){blob?resolve(blob):reject(new Error("Could not create enhanced image"));},type||"image/png",quality||.95);
  });
}
function sharpenCanvas(canvas,amount){
  const ctx=canvas.getContext("2d",{willReadFrequently:true});
  const img=ctx.getImageData(0,0,canvas.width,canvas.height);
  const data=img.data,src=new Uint8ClampedArray(data),w=canvas.width,h=canvas.height,a=Number(amount||.28);
  for(let y=1;y<h-1;y++){
    for(let x=1;x<w-1;x++){
      const i=(y*w+x)*4;
      for(let c=0;c<3;c++){
        const v=src[i+c]*(1+4*a)-src[i-4+c]*a-src[i+4+c]*a-src[i-w*4+c]*a-src[i+w*4+c]*a;
        data[i+c]=Math.max(0,Math.min(255,v));
      }
    }
  }
  ctx.putImageData(img,0,0);
  return canvas;
}
async function makePrintReadyImage(src,name){
  const img=await imageLoadFromDataUrl(src);
  const short=Math.min(img.naturalWidth,img.naturalHeight),long=Math.max(img.naturalWidth,img.naturalHeight);
  let scale=Math.max(1,3000/Math.max(1,short));
  scale=Math.min(scale,3);
  if(long*scale>4400)scale=4400/long;
  scale=Math.max(1,scale);
  const w=Math.max(1,Math.round(img.naturalWidth*scale)),h=Math.max(1,Math.round(img.naturalHeight*scale));
  const canvas=document.createElement("canvas");
  canvas.width=w;canvas.height=h;
  const ctx=canvas.getContext("2d",{willReadFrequently:true});
  ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality="high";
  ctx.filter="contrast(1.06) saturate(1.03)";
  ctx.drawImage(img,0,0,w,h);
  ctx.filter="none";
  if(w*h<=14000000)sharpenCanvas(canvas,.22);
  const blob=await canvasToBlob(canvas,"image/png",.95);
  const base=String(name||"logo").replace(/\.[^.]+$/,"").replace(/[^a-z0-9_-]+/gi,"-").replace(/^-+|-+$/g,"").slice(0,40)||"logo";
  return new File([blob],base+"-print-ready.png",{type:"image/png"});
}

async function handleBrandLogoUpload(input){
  const file=input.files&&input.files[0];if(!file)return;
  if(!/\.(png|jpe?g|svg)$/i.test(file.name)){alert("Upload a PNG, JPG, or SVG logo.");return;}
  if(file.size>(/\.svg$/i.test(file.name)?20:15)*1024*1024){alert("For this browser proof, use a file under 15MB for PNG/JPG or 20MB for SVG. Keep the full-resolution original for fulfillment.");input.value="";return;}
  let quality;
  try{quality=await analyzePrintUpload(file,{printWidthIn:12});}
  catch(e){alert("Could not inspect this image. Please upload a PNG, JPG, or SVG file.");input.value="";return;}
  if(!quality.ok){
    alert("Upload rejected:\n\n"+quality.rejects.join("\n")+"\n\nUse the original phone/camera file, not a screenshot, profile picture, or social media download.");
    input.value="";
    return;
  }
  brandLogoName=file.name;
  brandLogoQuality=quality;
  const isSvg=/\.svg$/i.test(file.name)||file.type==="image/svg+xml";
  brandLogoUrl=isSvg?await readFileAsDataURL(file):quality.dataUrl;
  persistBrandLogo();
  dLoad();
}

function handleCSV(input){
  if(!input.files||!input.files[0])return;
  var file=input.files[0];
  var reader=new FileReader();
  reader.onload=function(e){
    var lines=e.target.result.split('\n');
    var headers=lines[0].split(',').map(function(h){return h.trim().toLowerCase();});
    var nameIdx=headers.findIndex(function(h){return h.includes('name');});
    var emailIdx=headers.findIndex(function(h){return h.includes('email');});
    if(nameIdx===-1||emailIdx===-1){alert('CSV must have a Name and Email column.');return;}
    var imported=0;
    var tok=S?S.token:SK;
    var promises=[];
    for(var i=1;i<Math.min(lines.length,501);i++){
      var cols=lines[i].split(',');
      if(cols[emailIdx]&&cols[emailIdx].includes('@')){
        promises.push(db.ins('customers',{name:(cols[nameIdx]||'').trim(),email:(cols[emailIdx]||'').trim(),status:'active',user_id:myId()},tok));
        imported++;
      }
    }
    Promise.all(promises).then(function(){
      alert('Successfully imported '+imported+' customers!');
      obImport='platform';
      R();
    }).catch(function(e){alert('Import error: '+e.message);});
  };
  reader.readAsText(file);
}

function riEstimateChurn(freqDays,riskDays){
  var base=riskDays<=21?.24:riskDays<=35?.18:riskDays<=65?.12:riskDays<=95?.08:.06;

  if(expected>=3)base+=.03;

  return Math.max(.04,Math.min(.35,Math.round(base*100)/100));
}

async function saveDCol(btn){
  var a=(document.getElementById("dColInp")?.value||"").trim();
  var bg=(document.getElementById("dBgInp")?.value||"").trim();
  if(!/^#[0-9a-fA-F]{6}$/.test(a)||!/^#[0-9a-fA-F]{6}$/.test(bg)){alert("Pick your colors first");return;}
  if(btn){btn.disabled=true;btn.textContent="Saving...";}
  try{
    var r=await fetch(SU+"/rest/v1/clicktide?user_id=eq."+myId(),{method:"PATCH",headers:Object.assign({},h(S?.token||SK),{Prefer:"return=minimal"}),body:JSON.stringify({dashboard_color:a,dashboard_bg:bg})});
    if(!r.ok)throw new Error("Could not save");
    if(bizLock){bizLock.dashboard_color=a;bizLock.dashboard_bg=bg;}
  }catch(e){alert(e.message);}
  dLoad();
}
async function saveGRev(btn){

  if(v&&!/^https?:\/\//i.test(v)){alert("Please paste a full link starting with https://");return;}
  if(btn){btn.disabled=true;btn.textContent="Saving...";}
  try{
    var r=await fetch(SU+"/rest/v1/clicktide?user_id=eq."+myId(),{method:"PATCH",headers:Object.assign({},h(S?.token||SK),{Prefer:"return=minimal"}),body:JSON.stringify({google_review_url:v||null})});

function ctShade(hex,amt){var h=hex.replace("#","");var r=Math.min(255,Math.max(0,parseInt(h.substr(0,2),16)+amt)),g=Math.min(255,Math.max(0,parseInt(h.substr(2,2),16)+amt)),b=Math.min(255,Math.max(0,parseInt(h.substr(4,2),16)+amt));return "#"+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);}
function ctTheme(){
  try{
    if(!bizLock||String(bizLock.plan||"").toLowerCase()!=="scale")return "";
    var s="";
    var a=bizLock.dashboard_color||"";
    if(/^#[0-9a-fA-F]{6}$/.test(a))s+=".btn-gold{background:"+a+" !important}.ni.on{color:"+a+" !important}";
    var bg=bizLock.dashboard_bg||"";
    if(/^#[0-9a-fA-F]{6}$/.test(bg)&&bg.toLowerCase()!=="#080d18"){
      var p=ctShade(bg,10),inp=ctShade(bg,22);
      s+="body{background:"+bg+" !important}.sb,.dc,.sc{background:"+p+" !important}.fi{background:"+inp+" !important}";
    }
    return s?"<style>"+s+"</style>":"";
  }catch(e){return "";}
}

// -- Send a physical gift -----------------------------------------------------
async function sendPhysicalGift({campaignId,customerId,customerName,customerEmail,address,giftIndex,gift:giftInput,logoUrl,businessName,giftCost,addressOverride}){
  const gift=giftInput||giftOptions()[giftIndex]||PRINTIFY_CATALOG[giftIndex];
  if(!gift){console.error("Invalid gift option");return;}
  const cost=Number(giftCost||gift.cost||gift.p||gift.estimated_cost||0);

  const res=await fetch(`${FN}/printify-fulfill-gift`,{
    method:"POST",
    headers:{"Content-Type":"application/json",apikey:SK,Authorization:`Bearer ${S?.token||SK}`},
    body:JSON.stringify({
      campaign_id:campaignId,
      address_override:addressOverride===true,
      user_id:myId(),
      merchant_id:myId(),
      gift_cost:cost,
      customer_id:customerId||null,
      customer_name:customerName,
      customer_email:customerEmail,
      address,
      printify_product_id:gift.printify_product_id||gift.id,
      printify_variant_id:gift.printify_variant_id||gift.variant_id,
      logo_url:logoUrl||null,
      business_name:businessName||"",
      gift_name:gift.n,
    })
  });

  const data=await res.json();
  if(!res.ok){throw new Error(data.error||"Gift fulfillment failed");}
  return data;
}

function shippingAddressComplete(a){
  return !!(a&&a.address1&&a.city&&a.region&&/^[0-9]{5}(-[0-9]{4})?$/.test(String(a.zip||"").trim()));
}
function shippingAddressText(a){
  return [a?.address1,a?.city,a?.region,a?.zip].filter(Boolean).join(", ");
}
function applyVerifiedAddress(a,n){
  n=n||{};
  return {
    address1:String(n.address1||a.address1||"").trim(),
    city:String(n.city||a.city||"").trim(),
    region:String(n.region||a.region||"").trim(),
    zip:String(n.zip||a.zip||"").trim(),
    country:String(n.country||a.country||"US").trim()||"US",
    email:a.email||""
  };
}
async function verifyShippingAddress(a){
  if(!shippingAddressComplete(a))return {valid:false,error:"Add street, city, state, and a valid ZIP before sending a gift."};
  try{
    const r=await fetch(`${FN}/validate-address`,{method:"POST",headers:{"Content-Type":"application/json",apikey:SK,Authorization:`Bearer ${S?.token||SK}`},body:JSON.stringify({address:a.address1,city:a.city,state:a.region,zip:a.zip})});
    const d=await r.json().catch(()=>({}));
    if(!r.ok)return {valid:false,error:d.error||"Address verification failed."};
    if(d.valid===true)return {valid:true,address:applyVerifiedAddress(a,d.normalized),matched:d.matched||shippingAddressText(a),source:d.source||"validator"};
    if(d.valid===false)return {valid:false,error:d.error||"We couldn't verify that shipping address. Double-check it before sending."};
    return {valid:false,unavailable:true,error:"Address verification is temporarily down — we couldn't check this address."};
  }catch(e){
    return {valid:false,unavailable:true,error:"Address verification is temporarily down — we couldn't check this address."};
  }
}
// Owner-facing fallback: when the validator rejects or is down, the owner can
// explicitly confirm the address as typed ("money needs a yes" — a human yes
// counts). Server still requires address_override for unverified shipping.
async function verifyOrOverrideAddress(a){
  const v=await verifyShippingAddress(a);
  if(v.valid)return v;
  if(confirm((v.error||"We couldn't verify that address.")+"\n\nUse it exactly as typed anyway? Double-check it first — a gift shipped to a wrong address can't be recovered."))
    return {valid:true,address:applyVerifiedAddress(a,null),matched:shippingAddressText(a),source:"owner_override",override:true};
  return v;
}

async function sendManualGiftNow(btn){
  const customerId=btn?.dataset.cid||"";
  const gift=giftOptions()[Number(document.getElementById("mgGift")?.value||0)];
  const cost=Number(gift?.p||0);
  const balance=Number(document.getElementById("mgGift")?.dataset.balance||0);
  const name=(document.getElementById("mgName")?.value||"").trim();
  const email=(document.getElementById("mgEmail")?.value||"").trim();
  let address={address1:(document.getElementById("mgAddr")?.value||"").trim(),city:(document.getElementById("mgCity")?.value||"").trim(),region:(document.getElementById("mgState")?.value||"").trim(),zip:(document.getElementById("mgZip")?.value||"").trim(),country:"US",email:email};
  if(!gift){alert("Choose a gift first.");return;}
  if(!name||!email){alert("Add the customer's name and email first.");return;}
  if(!shippingAddressComplete(address)){alert("Add a complete mailing address before shipping a gift.");return;}
  if(cost>balance){alert("Not enough gift wallet funds. Add funds before sending this gift.");return;}
  if(btn){btn.disabled=true;btn.textContent="Verifying address...";}
  const verified=await verifyOrOverrideAddress(address);
  if(!verified.valid){alert(verified.error);if(btn){btn.disabled=false;btn.textContent="Send gift now";}return;}
  address=Object.assign({},verified.address,{email:email});
  if(!confirm("Send "+gift.n+" to "+name+" now? Your gift wallet will be charged $"+cost.toFixed(2)+".")){if(btn){btn.disabled=false;btn.textContent="Send gift now";}return;}
  if(btn){btn.disabled=true;btn.textContent="Sending...";}
  try{
    const biz=await loadBiz()||{};
    await fetch(SU+"/rest/v1/customers?id=eq."+encodeURIComponent(customerId),{method:"PATCH",headers:Object.assign({},h(S?.token||SK),{Prefer:"return=minimal"}),body:JSON.stringify({address:address.address1,city:address.city,state:address.region,zip:address.zip,address_confirmed_at:verified.override?null:new Date().toISOString()})});
    await sendPhysicalGift({campaignId:"manual-gift-"+Date.now(),customerId:customerId,customerName:name,customerEmail:email,address:address,gift:gift,logoUrl:biz.logo_url||null,businessName:biz.business_name||"",giftCost:cost,addressOverride:verified.override===true});
    document.querySelector(".ov")?.remove();
    alert("Gift sent. You can track it in Shipments.");
    dpg="shipments";dLoad();
  }catch(e){
    alert(e.message||"Could not send gift.");
    if(btn){btn.disabled=false;btn.textContent="Send gift now";}
  }
}

var giftCartCustomers=[],giftCartItems=[],giftCartBalance=0,giftCartBiz={},giftCartSending=false;
function giftCartAddressOk(c){
  return shippingAddressComplete(giftCartAddress(c));
}
function giftCartAddress(c){
  return {address1:(c.address||"").trim(),city:(c.city||"").trim(),region:(c.state||"").trim(),zip:(c.zip||"").trim(),country:"US",email:c.email||""};
}
function giftCartVerified(c){
  return !!(c&&c.address_confirmed_at&&giftCartAddressOk(c));
}
function giftCartGiftOptions(selected){
  return giftOptions().map(function(g,i){return "<option value='"+i+"' "+(Number(selected)===i?"selected":"")+">"+giftEsc(g.n)+" - $"+Number(g.p||0).toFixed(2)+"</option>";}).join("");
}
function giftCartItemGift(item){
  return giftOptions()[Number(item.giftIndex||0)]||giftOptions()[0];
}
function giftCartTotal(){
  return giftCartItems.reduce(function(sum,item){const g=giftCartItemGift(item);return sum+Number(g?.p||0);},0);
}
function giftCartAddressBadge(item){
  if(item.verifiedSource==="owner_override")return "<span style='font-size:10px;color:#FF9F4D;font-weight:800'>⚠ Owner confirmed (unverified)</span>";
  if(item.verifiedSource==="on_file")return "<span style='font-size:10px;color:#22C55E;font-weight:800'>✓ On file</span>";
  const source=item.verifiedSource==="google"?"Google verified":"Verified";
  return "<span style='font-size:10px;color:#22C55E;font-weight:800'>✓ "+source+"</span>";
}

async function giftCartAddCustomer(id,btn){
  const c=giftCartCustomers.find(function(x){return String(x.id)===String(id);});
  if(!c)return;
  if(!giftCartAddressOk(c)){alert("Add a complete mailing address before adding this customer.");return;}
  const giftIndex=Number(document.getElementById("giftCartDefaultGift")?.value||0);
  const gift=giftOptions()[giftIndex]||giftOptions()[0];
  let address=giftCartAddress(c),source=c.address_confirmed_at?"on_file":"";
  if(!c.address_confirmed_at){
    if(btn){btn.disabled=true;btn.textContent="Verifying...";}
    const verified=await verifyOrOverrideAddress(address);
    if(btn){btn.disabled=false;btn.textContent="Verify + Add";}
    if(!verified.valid){alert(verified.error);return;}
    address=Object.assign({},verified.address,{email:c.email||""});

async function sendGiftCart(btn){
  if(giftCartSending)return; // a batch is already in flight — never double-ship
  const total=giftCartTotal();
  if(!giftCartItems.length){alert("Add gifts to the cart first.");return;}
  const bad=giftCartItems.find(function(item){return !item.verified||!shippingAddressComplete(item.address);});
  if(bad){alert("Every cart line needs a verified full shipping address before sending.");return;}
  if(total>giftCartBalance){alert("Not enough gift wallet funds for this cart.");return;}
  if(!document.getElementById("giftCartConfirm")?.checked){alert("Confirm every recipient, gift, and verified address before sending.");return;}
  if(!confirm("Send "+giftCartItems.length+" gift"+(giftCartItems.length===1?"":"s")+" now? Your gift wallet will be charged about $"+total.toFixed(2)+"."))return;
  giftCartSending=true;
  if(btn){btn.disabled=true;btn.textContent="Sending 0/"+giftCartItems.length+"...";}
  const batchId="manual-gift-bulk-"+Date.now();
  const items=giftCartItems.slice(); // snapshot — edits to the open cart can't change what was confirmed
  let sent=0;const failed=[];const sentIds={};
  try{
    for(const item of items){
      try{
        let customerId=item.customerId||null;
        if(!customerId){
          const created=await db.ins("customers",{name:item.name,email:item.email||null,address:item.address.address1,city:item.address.city,state:item.address.region,zip:item.address.zip,address_confirmed_at:item.verifiedSource==="owner_override"?null:new Date().toISOString(),business_id:"manual-gift-cart",total_spent:0,status:"active",user_id:myId()},S?.token||SK);
          if(created&&created.message)throw new Error(String(created.message).replace("PLAN_CUSTOMER_LIMIT_REACHED:","Plan limit reached:"));
          customerId=Array.isArray(created)&&created[0]?.id?String(created[0].id):null;
          item.customerId=customerId; // remember it — a retry must not create a duplicate customer
        }
        const gift=giftCartItemGift(item);
        await sendPhysicalGift({campaignId:batchId+"-"+item.id,customerId:customerId,customerName:item.name||"Customer",customerEmail:item.email||"",address:item.address,gift:gift,logoUrl:giftCartBiz.logo_url||null,businessName:giftCartBiz.business_name||"",giftCost:Number(gift?.p||0),addressOverride:item.verifiedSource==="owner_override"});
        sent++;sentIds[item.id]=true;
        if(btn)btn.textContent="Sending "+sent+"/"+items.length+"...";
      }catch(e){
        failed.push((item.name||"Customer")+": "+(e.message||"failed"));
      }
    }
  }finally{giftCartSending=false;}
  giftCartItems=giftCartItems.filter(function(x){return !sentIds[x.id];}); // keep failed lines for retry
  if(failed.length){
    if(btn){btn.disabled=false;}
    giftCartRender();
    alert("Sent "+sent+" gift"+(sent===1?"":"s")+". Could not send "+failed.length+":\n"+failed.join("\n")+"\n\nThe failed lines are still in your cart — fix and retry, or remove them.");
  }else{
    btn?.closest(".ov")?.remove();
    alert("Gift cart sent. You can track everything in Shipments.");
    dpg="shipments";dLoad();
  }
}

async function mfaVerify(fid,btn){

    var vd=await v.json();if(!v.ok)throw new Error(vd.message||vd.msg||"Wrong code — try again");

<script>
// ---- Clicktide Brand Studio (Fabric.js) v2 ----
var stuCanvas=null,stuProduct=null,stuLogoObj=null,stuFont="Inter",stuColor="#FFD166",stuPrintRect=null,stuStep=1;
var STU_PRINT_W=3000,STU_PRINT_H=2400;
var STU_FONTS=["Inter","Roboto","Open Sans","Montserrat","Poppins","Lato","Oswald","Raleway","Bebas Neue","Anton","Archivo Black","Righteous","Alfa Slab One","Bangers","Playfair Display","Merriweather","Lora","Abril Fatface","Cormorant Garamond","Pacifico","Dancing Script","Great Vibes","Caveat","Satisfy","Lobster","Sacramento","Amatic SC","Permanent Marker","Shadows Into Light","Space Mono"];
var STU_COLORS=["#FFFFFF","#000000","#FFD166","#4DA6FF","#22C55E","#FF4D6D","#A78BFA","#FF9F4D","#0B62D6","#111827","#E11D48","#0EA5E9","#84CC16","#F59E0B","#EC4899","#14B8A6"];

function studioLoadFonts(){
  if(document.getElementById("stuFonts"))return;
  var fams=STU_FONTS.filter(function(f){return f!=="Inter";}).map(function(f){return "family="+f.trim().replace(/ /g,"+");}).join("&");
  var l=document.createElement("link");
  l.id="stuFonts";l.rel="stylesheet";
  l.href="https://fonts.googleapis.com/css2?"+fams+"&display=swap";
  document.head.appendChild(l);
  if(document.fonts&&document.fonts.ready)document.fonts.ready.then(function(){if(stuCanvas)stuCanvas.requestRenderAll();});
}

function studioPage(){
  var gifts=giftOptions();
  var opts=gifts.map(function(g,i){return '<option value="'+i+'">'+giftEsc(g.n)+' (~$'+Number(g.p||0).toFixed(0)+')</option>';}).join('');
  var fonts=STU_FONTS.map(function(f){return '<option style="font-family:\''+f+'\'"'+(f===stuFont?' selected':'')+'>'+f+'</option>';}).join('');
  var swatches=STU_COLORS.map(function(c){return '<div onclick="studioColor(\''+c+'\')" title="'+c+'" style="width:24px;height:24px;border-radius:6px;background:'+c+';cursor:pointer;border:2px solid '+(c===stuColor?'#FFD166':'rgba(255,255,255,.15)')+'"></div>';}).join('');
  var rail=[[1,'Upload','Add artwork'],[2,'Text','Brand message'],[3,'Product','Choose gift'],[4,'Proof','Review & save']].map(function(s){
    return '<div onclick="stuStep='+s[0]+';studioRefreshRail()" id="stuStep'+s[0]+'" style="display:flex;gap:10px;align-items:center;padding:10px;border-radius:10px;cursor:pointer;margin-bottom:4px;background:'+(stuStep===s[0]?'rgba(255,209,102,.1)':'transparent')+'">'
      +'<div style="width:24px;height:24px;border-radius:50%;background:#FFD166;color:#080D18;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0">'+s[0]+'</div>'
      +'<div><div style="font-size:12px;font-weight:700">'+s[1]+'</div><div style="font-size:10px;color:rgba(240,244,255,.45)">'+s[2]+'</div></div></div>';
  }).join('');
  return '<div class="dh"><div><div class="dt">Brand Studio</div><div class="ds">Design how your logo and message print on each gift.</div></div></div>'
  +'<div style="display:grid;grid-template-columns:180px minmax(0,1fr) 250px;gap:14px;align-items:start">'
    +'<div class="dc" style="padding:10px">'+rail
      +'<div style="border-top:1px solid rgba(255,255,255,.07);margin-top:8px;padding-top:10px">'
      +'<label class="btn btn-gold" style="display:block;text-align:center;font-size:12px;cursor:pointer">Upload logo<input type="file" accept="image/png,image/jpeg,image/svg+xml" style="display:none" onchange="studioUploadLogo(event)"/></label>'
      +'<button class="btn btn-ghost" style="width:100%;margin-top:8px;font-size:12px" onclick="studioAddText()">+ Add text</button>'
      +'<button class="btn btn-outline" style="width:100%;margin-top:8px;font-size:12px" onclick="studioRemoveSelected()">Remove selected</button>'
      +'</div></div>'
    +'<div class="dc" style="display:flex;flex-direction:column;align-items:center;padding:14px;overflow:auto">'
      +'<canvas id="stuCanvasEl" width="640" height="520" style="border-radius:12px;max-width:100%"></canvas>'
      +'<div style="font-size:11px;color:rgba(240,244,255,.4);margin-top:8px">Dashed box = print area ('+STU_PRINT_W+' × '+STU_PRINT_H+' px). Drag and resize your logo and text inside it.</div>'
    +'</div>'
    +'<div class="dc" style="padding:14px">'
      +'<div class="fg"><label class="fl">Product</label><select class="fi-sel" id="stuProdSel" onchange="studioPickProduct(this.value)">'+opts+'</select></div>'
      +'<div class="fg"><label class="fl">Brand font ('+STU_FONTS.length+')</label><select class="fi-sel" id="stuFontSel" onchange="studioFont(this.value)" style="font-family:\''+stuFont+'\'">'+fonts+'</select></div>'
      +'<div class="fg"><label class="fl">Brand color</label><div id="stuSwatches" style="display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-bottom:8px">'+swatches+'</div>'
      +'<div style="display:flex;align-items:center;gap:8px"><input type="color" id="stuColorPick" value="'+stuColor+'" oninput="studioColor(this.value)" style="width:38px;height:30px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:#101828;padding:0"/><span style="font-size:11px;color:rgba(240,244,255,.45)">Custom color</span></div></div>'
      +'<div id="stuQuality" style="font-size:11px;color:rgba(240,244,255,.5);margin-bottom:12px;line-height:1.5"></div>'
      +'<button class="btn-full btn-gold" onclick="studioSaveProof()" style="margin-bottom:8px">Save & approve proof</button>'
      +'<button class="btn-full btn-ghost" onclick="studioDownloadPrint()">Download print file</button>'
      +'<div id="stuStatus" style="font-size:11px;margin-top:10px;color:#22C55E"></div>'
    +'</div>'
  +'</div>';
}
function studioInit(){
  if(typeof fabric==="undefined"){var s=document.getElementById("stuStatus");if(s){s.style.color="#FF4D6D";s.textContent="Editor library failed to load — refresh the page.";}return;}
  studioLoadFonts();
  stuCanvas=new fabric.Canvas("stuCanvasEl",{backgroundColor:"#101828",preserveObjectStacking:true});
  var w=420,h=Math.round(w*STU_PRINT_H/STU_PRINT_W);
  stuPrintRect=new fabric.Rect({left:(640-w)/2,top:(520-h)/2,width:w,height:h,fill:"rgba(255,255,255,0.02)",stroke:"rgba(255,255,255,0.5)",strokeDashArray:[6,5],selectable:false,evented:false});
  stuCanvas.add(stuPrintRect);
  var sel=document.getElementById("stuProdSel");
  studioPickProduct(sel?sel.value:0);
}
function studioPickProduct(i){
  var gifts=giftOptions();stuProduct=gifts[Number(i)||0]||gifts[0];
  if(!stuCanvas)return;
  if(stuProduct&&stuProduct.image_url){
    fabric.Image.fromURL(giftImgSrc(stuProduct.image_url),function(img){
      if(!img||!img.width)return;
      var scale=Math.min(640/img.width,520/img.height);
      stuCanvas.setBackgroundImage(img,stuCanvas.renderAll.bind(stuCanvas),{scaleX:scale,scaleY:scale,left:(640-img.width*scale)/2,top:(520-img.height*scale)/2,opacity:0.92});
    },{crossOrigin:"anonymous"});
  }else{
    stuCanvas.setBackgroundImage(null,stuCanvas.renderAll.bind(stuCanvas));
    stuCanvas.backgroundColor="#101828";stuCanvas.renderAll();
  }
}
function studioUploadLogo(e){
  var f=e.target.files&&e.target.files[0];if(!f||!stuCanvas)return;
  var r=new FileReader();
  r.onload=function(){
    fabric.Image.fromURL(String(r.result),function(img){
      if(stuLogoObj)stuCanvas.remove(stuLogoObj);
      img.scaleToWidth(stuPrintRect.width*0.6);
      img.set({left:stuPrintRect.left+(stuPrintRect.width-img.getScaledWidth())/2,top:stuPrintRect.top+24});
      stuLogoObj=img;stuCanvas.add(img);stuCanvas.setActiveObject(img);stuCanvas.renderAll();
      var q=document.getElementById("stuQuality");
      if(q)q.innerHTML=img.width>=2000?'<span style="color:#22C55E">✓ Logo resolution looks great ('+img.width+'px wide)</span>'
        :img.width>=1000?'<span style="color:#FFD166">△ Logo is '+img.width+'px wide — 2000px+ prints sharper</span>'
        :'<span style="color:#FF4D6D">✗ Logo is only '+img.width+'px wide — it will likely print blurry. Use the original file, not a screenshot.</span>';
    });
  };
  r.readAsDataURL(f);
}
function studioAddText(){
  if(!stuCanvas)return;
  var t=new fabric.IText("Thank you",{left:stuPrintRect.left+40,top:stuPrintRect.top+stuPrintRect.height-70,fontFamily:stuFont,fill:stuColor,fontSize:34,fontWeight:"400"});
  stuCanvas.add(t);stuCanvas.setActiveObject(t);stuCanvas.renderAll();
}
function studioRemoveSelected(){var o=stuCanvas&&stuCanvas.getActiveObject();if(o&&o!==stuPrintRect){if(o===stuLogoObj)stuLogoObj=null;stuCanvas.remove(o);stuCanvas.renderAll();}}
function studioFont(v){
  stuFont=v;
  var sel=document.getElementById("stuFontSel");if(sel)sel.style.fontFamily="'"+v+"'";
  var o=stuCanvas&&stuCanvas.getActiveObject();
  var apply=function(){if(o&&o.type==="i-text"){o.set("fontFamily",v);}if(stuCanvas)stuCanvas.requestRenderAll();};
  if(document.fonts&&document.fonts.load)document.fonts.load('20px "'+v+'"').then(apply).catch(apply);
  else apply();
}
function studioColor(v){
  stuColor=v;
  var pick=document.getElementById("stuColorPick");if(pick)pick.value=v;
  var sw=document.getElementById("stuSwatches");
  if(sw){var kids=sw.children;for(var i=0;i<kids.length;i++){kids[i].style.borderColor=(STU_COLORS[i]===v)?"#FFD166":"rgba(255,255,255,.15)";}}
  var o=stuCanvas&&stuCanvas.getActiveObject();
  if(o&&o.type==="i-text"){o.set("fill",v);stuCanvas.renderAll();}
}
function studioArtwork(){return stuCanvas?stuCanvas.getObjects().filter(function(o){return o!==stuPrintRect;}):[];}
function studioSaveProof(){
  if(!stuCanvas||!stuProduct)return;
  if(!studioArtwork().length){alert("Add your logo or some text before saving a proof.");return;}
  try{
    localStorage.setItem("ct_proof_"+(stuProduct.id||stuProduct.n),JSON.stringify({product:stuProduct.n,design:stuCanvas.toJSON(),approved:true,at:new Date().toISOString()}));
    var s=document.getElementById("stuStatus");if(s)s.textContent="Proof saved & approved for "+stuProduct.n+" ✓";
  }catch(e){alert("Could not save proof: "+e.message);}
}
function studioDownloadPrint(){
  var arts=studioArtwork();
  if(!arts.length){alert("Add your logo or some text first.");return;}
  var mult=STU_PRINT_W/stuPrintRect.width;
  var off=new fabric.StaticCanvas(null,{width:STU_PRINT_W,height:STU_PRINT_H});
  var done=0;
  arts.forEach(function(o){
    o.clone(function(c){
      c.set({left:(o.left-stuPrintRect.left)*mult,top:(o.top-stuPrintRect.top)*mult,scaleX:(o.scaleX||1)*mult,scaleY:(o.scaleY||1)*mult});
      off.add(c);done++;
      if(done===arts.length){
        off.renderAll();
        var a=document.createElement("a");
        a.download=(stuProduct&&stuProduct.n?stuProduct.n.replace(/\s+/g,"-").toLowerCase():"clicktide")+"-print-file.png";
        a.href=off.toDataURL({format:"png"});
        a.click();
        var s=document.getElementById("stuStatus");if(s)s.textContent="Print file downloaded at "+STU_PRINT_W+"×"+STU_PRINT_H+"px ✓";
      }
    });
  });
}
function studioRefreshRail(){for(var i=1;i<=4;i++){var el=document.getElementById("stuStep"+i);if(el)el.style.background=(i===Number(stuStep))?"rgba(255,209,102,.1)":"transparent";}}

    if(b.t==="image")html+='<div class="fg"><label class="fl">Image URL</label><input class="fi" value="'+giftEsc(b.url||"")+'" onchange="emBlocks['+emSelIdx+'].url=this.value;emRedraw()"/></div>';
    html+='<div style="display:flex;gap:6px"><button class="btn btn-ghost" style="flex:1;font-size:11px;padding:7px" onclick="emMove(-1)">↑</button><button class="btn btn-ghost" style="flex:1;font-size:11px;padding:7px" onclick="emMove(1)">↓</button><button class="btn" style="flex:1;background:rgba(255,77,109,.12);color:#FF4D6D;border:1px solid rgba(255,77,109,.2);font-size:11px;padding:7px" onclick="emDelBlock()">Delete</button></div>';
  }else{
    html+='<div style="font-size:11px;color:rgba(15,17,21,.4);line-height:1.6;border-top:1px solid rgba(15,23,42,.12);padding-top:12px">Click any block in the email to edit, move, or delete it. Text edits happen right in the email.</div>';
  }
  return html;
}
function emAdd(t){
  var b=t==="text"?{t:"text",v:"New text — click to edit"}:t==="button"?{t:"button",v:"Click me",url:"https://goclicktide.com"}:t==="image"?{t:"image",url:""}:{t:"divider"};
  emBlocks.push(b);emSelIdx=emBlocks.length-1;emRedraw();
}
function emMove(d){var i=emSelIdx,j=i+d;if(i<0||j<0||j>=emBlocks.length)return;var x=emBlocks[i];emBlocks[i]=emBlocks[j];emBlocks[j]=x;emSelIdx=j;emRedraw();}
function emDelBlock(){if(emSelIdx<0)return;emBlocks.splice(emSelIdx,1);emSelIdx=-1;emRedraw();}
function emBrandSet(k,v){emBrand[k]=v;emRedraw();}

function emProps(){var p=document.getElementById("emProps");if(p)p.innerHTML=emPropsHtml();}

async function emSave(){
  var st=document.getElementById("emStatus");
  if(!S||!S.token){if(st){st.textContent="Log in to save your template.";st.style.color="#FF6B6B";}return;}
  if(st){st.textContent="Saving...";st.style.color="rgba(15,17,21,.5)";}
  var payload={user_id:myId(),name:"Default",subject:emSubject,blocks:emBlocks,brand:emBrand,updated_at:new Date().toISOString()};
  try{
    var r;
    var hdrs=Object.assign({},h(S.token),{Prefer:"return=representation"});
    if(emRowId)r=await fetch(SU+"/rest/v1/email_templates?id=eq."+emRowId,{method:"PATCH",headers:hdrs,body:JSON.stringify(payload)});
    else r=await fetch(SU+"/rest/v1/email_templates",{method:"POST",headers:hdrs,body:JSON.stringify(payload)});
    var rows=await r.json().catch(function(){return null;});
    if(r.ok&&Array.isArray(rows)&&rows[0])emRowId=rows[0].id;
    if(st){st.textContent=r.ok?"Template saved ✓ — campaign emails will use this design.":"Couldn't save — please try again.";st.style.color=r.ok?"#22C55E":"#FF6B6B";}
  }catch(e){if(st){st.textContent="Couldn't save: "+e.message;st.style.color="#FF6B6B";}}
}
</script>
<script>
(function(){
var FNB=(typeof FN!=="undefined"?FN:"https://hmihfncvahsdlmefyxyg.supabase.co/functions/v1");

function petals(id,size){var s='<svg width="'+size+'" height="'+size+'" viewBox="0 0 44 44"><defs><linearGradient id="'+id+'"><stop offset="0%" stop-color="#BAE6FD"/><stop offset="100%" stop-color="#2776C4"/></linearGradient></defs><g transform="translate(22,22)">';[0,51.4,102.8,154.2,205.6,257,308.4].forEach(function(r){s+='<path d="M0,-16 C2,-16 7,-10 6,-4 C5,1 2,4 0,4 C-2,4 -3,2 -3,0 C-3,-5 -2,-16 0,-16Z" fill="url(#'+id+')" transform="rotate('+r+')" opacity=".9"/>';});return s+'<circle cx="0" cy="0" r="4.5" fill="#080D18"/></g></svg>';}
var LOGO=petals("cwlgA",32);
var CLOSE='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2776C4" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';

try{var p=JSON.parse(localStorage.getItem("ct_chat_pos")||"null");if(p&&typeof p.l==="number"&&typeof p.b==="number"){wrap.style.left=p.l+"px";wrap.style.bottom=p.b+"px";if(p.l>window.innerWidth/2)wrap.style.alignItems="flex-end";}}catch(e){}
var teaser=document.createElement("div");
teaser.style.cssText="display:flex;align-items:center;gap:8px;background:#FFFFFF;border:1px solid rgba(77,166,255,.25);border-radius:16px 16px 16px 4px;padding:10px 14px;font-size:13px;color:#0F1115;max-width:230px;line-height:1.5;cursor:pointer;box-shadow:0 8px 24px rgba(20,40,70,.25);margin-bottom:4px";

wrap.appendChild(teaser);wrap.appendChild(btn);document.body.appendChild(wrap);
var panel=document.createElement("div");

function esc2(t){return t.replace(/[&<>]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c];});}
function draw(){var log=document.getElementById("ctChatLog");if(!log)return;log.innerHTML=msgs.map(function(m){return '<div style="max-width:85%;padding:9px 12px;border-radius:12px;font-size:13px;line-height:1.55;font-family:Inter,sans-serif;white-space:pre-wrap;'+(m.r==="user"?"align-self:flex-end;background:#FFD166;color:#080D18":"align-self:flex-start;background:#F4F6FA;color:#0F1115;border:1px solid rgba(15,23,42,.12)")+'">'+esc2(m.t)+'</div>';}).join("");log.scrollTop=log.scrollHeight;}

teaser.addEventListener("click",function(e){if(e.target&&e.target.id==="cwTeaserX"){dismissed=true;teaser.style.display="none";e.stopPropagation();return;}openChat();});
var dragging=false,moved=false,sx=0,sy=0,ol=0,ob=0;
btn.addEventListener("pointerdown",function(e){dragging=true;moved=false;sx=e.clientX;sy=e.clientY;var rc=wrap.getBoundingClientRect();ol=rc.left;ob=window.innerHeight-rc.bottom;btn.style.cursor="grabbing";try{btn.setPointerCapture(e.pointerId);}catch(err){}e.preventDefault();});

btn.addEventListener("pointerup",function(){if(!dragging)return;dragging=false;btn.style.cursor="grab";if(!moved){if(open){closeChat();}else{openChat();}return;}
var rc=wrap.getBoundingClientRect();var snapL=(rc.left+28<window.innerWidth/2)?16:window.innerWidth-72;wrap.style.transition="left .25s ease";wrap.style.left=snapL+"px";wrap.style.alignItems=(snapL===16)?"flex-start":"flex-end";var B=Math.round(window.innerHeight-rc.bottom);try{localStorage.setItem("ct_chat_pos",JSON.stringify({l:snapL,b:B}));}catch(err){}if(open)setTimeout(placePanel,260);setTimeout(function(){wrap.style.transition="";},300);});

setInterval(function(){if(!open&&!dismissed){ti=(ti+1)%TEASERS.length;var el=document.getElementById("cwTeaserTxt");if(el)el.textContent=TEASERS[ti];}},5000);
})();
