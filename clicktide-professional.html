<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Clicktide -- Professional Preview</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="icon" type="image/png" sizes="64x64" href="favicon.png"><link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png"><link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080D18;color:#F0F4FF;font-family:'Inter',sans-serif}
nav{position:sticky;top:0;z-index:99;display:flex;align-items:center;justify-content:space-between;padding:14px 32px;background:rgba(8,13,24,0.96);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.07)}
.logo{display:flex;align-items:center;gap:9px;cursor:pointer}
.logo-text{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase}
.blue{color:#4DA6FF}.gold{color:#FFD166}.white{color:#F0F4FF}
.btn{padding:9px 20px;border-radius:100px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:'Inter',sans-serif}
.btn-gold{background:#FFD166;color:#080D18}
.btn-ghost{background:rgba(255,255,255,0.07);color:#F0F4FF;border:1px solid rgba(255,255,255,0.1)}
.btn-outline{background:transparent;color:rgba(240,244,255,0.5);border:1px solid rgba(255,255,255,0.1)}
.btn:hover{opacity:0.85}
.screen{display:none}.screen.on{display:block}
/* HERO */
.hero{padding:80px 32px 60px;text-align:center;position:relative;overflow:hidden}
.hero:before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 20%,rgba(77,166,255,0.07),transparent 70%);pointer-events:none}
.badge{display:inline-flex;align-items:center;gap:7px;background:rgba(77,166,255,0.08);border:1px solid rgba(77,166,255,0.2);border-radius:100px;padding:6px 16px;font-size:11px;font-weight:700;color:#4DA6FF;text-transform:uppercase;letter-spacing:.5px;margin-bottom:22px}
.dot{width:6px;height:6px;border-radius:50%;background:#4DA6FF;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(36px,6vw,66px);line-height:1.02;font-weight:800;letter-spacing:-2px;margin-bottom:20px}
.sub{font-size:16px;line-height:1.75;color:rgba(240,244,255,.5);max-width:480px;margin:0 auto 30px}
.input-row{display:flex;justify-content:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.email-inp{padding:13px 18px;border-radius:100px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#F0F4FF;font-size:14px;outline:none;width:240px;font-family:'Inter',sans-serif}
.link-btn{background:transparent;border:none;color:#FFD166;font-size:13px;cursor:pointer;text-decoration:underline;font-family:'Inter',sans-serif}
.cookie-bar{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:500;width:min(560px,calc(100vw - 28px));background:#F8FAFC;color:#111827;border:1px solid rgba(15,23,42,.12);box-shadow:0 18px 60px rgba(0,0,0,.35);border-radius:16px;padding:16px 48px 16px 18px;font-size:13px;line-height:1.6;text-align:left}
.cookie-bar a{color:#0B62D6;font-weight:800;text-decoration:underline}
.cookie-x{position:absolute;right:14px;top:12px;width:28px;height:28px;border:0;background:transparent;color:#111827;font-size:24px;line-height:1;cursor:pointer}
.site-footer{background:#111827;border-top:1px solid rgba(255,255,255,.08);padding:36px 32px 30px;color:rgba(240,244,255,.74)}
.foot-wrap{max-width:980px;margin:0 auto}
.foot-top{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:28px}
.foot-contact{color:#F0F4FF;font-weight:800;text-decoration:underline;text-underline-offset:4px}
.foot-grid{display:grid;grid-template-columns:1.2fr repeat(3,1fr);gap:24px;margin-bottom:28px}
.foot-title{font-size:13px;font-weight:900;color:#F0F4FF;margin-bottom:12px}
.foot-links{display:flex;flex-direction:column;gap:8px}
.foot-links a,.foot-links button{background:transparent;border:0;padding:0;text-align:left;color:rgba(240,244,255,.58);font-size:12px;line-height:1.5;text-decoration:none;cursor:pointer;font-family:'Inter',sans-serif}
.foot-links a:hover,.foot-links button:hover{color:#FFD166}
.foot-note{border-top:1px solid rgba(255,255,255,.12);padding-top:20px;font-size:11px;line-height:1.8;color:rgba(240,244,255,.48)}
.foot-legal{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.foot-legal a{color:rgba(240,244,255,.58);font-size:11px;text-decoration:underline;text-underline-offset:3px}
.pills{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:36px}
.pill{padding:5px 12px;background:rgba(77,166,255,.06);border:1px solid rgba(77,166,255,.15);border-radius:100px;font-size:12px;color:rgba(240,244,255,.5)}
.notif{position:fixed;top:80px;right:20px;background:#0C1220;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:50;max-width:280px;animation:fadeUp .4s ease}
/* SECTIONS */
.sec{padding:64px 32px}.sec-sur{background:#0C1220}
.sec-title{font-family:'Space Grotesk',sans-serif;font-size:clamp(24px,4vw,42px);font-weight:800;letter-spacing:-1.5px;text-align:center;margin-bottom:12px}
.sec-sub{color:rgba(240,244,255,.45);font-size:15px;text-align:center;margin-bottom:40px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;max-width:900px;margin:0 auto}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:840px;margin:0 auto}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:840px;margin:0 auto}
.card{background:#080D18;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:22px}
.card-s{background:#0C1220;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:22px}
.stat-n{font-family:'Space Grotesk',sans-serif;font-size:36px;font-weight:800;color:#FFD166;margin-bottom:6px}
/* PLAN */
.plan{border-radius:18px;padding:24px;border:1px solid rgba(255,255,255,.07);background:#0C1220;position:relative}
.plan.pop{background:#101828;border-color:rgba(255,209,102,.3);transform:translateY(-6px)}
.plan-badge{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:#FFD166;color:#080D18;padding:3px 14px;border-radius:100px;font-size:11px;font-weight:700;white-space:nowrap}
.plan-price{font-family:'Space Grotesk',sans-serif;font-size:40px;font-weight:800;letter-spacing:-2px}
.feat{list-style:none;padding:0;display:flex;flex-direction:column;gap:8px;margin:14px 0 18px}
.feat li{font-size:12px;color:rgba(240,244,255,.5);display:flex;gap:6px}
.feat li::before{content:"✓";color:#22C55E;font-weight:700}
/* TYPE CARDS */
.tc{border-radius:18px;padding:24px;border:1px solid rgba(255,255,255,.07);background:#0C1220}
.tc.pop{background:#101828;border-color:rgba(255,209,102,.3);transform:translateY(-6px);position:relative}
/* AUTH */
.auth{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:#080D18}
.auth-card{width:100%;max-width:420px;background:#0C1220;border:1px solid rgba(255,255,255,.07);border-radius:22px;padding:32px}
.auth-title{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:800;margin-bottom:6px;text-align:center}
.auth-sub{font-size:13px;color:rgba(240,244,255,.45);text-align:center;margin-bottom:28px}
.fg{margin-bottom:16px}
.fl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(240,244,255,.45);display:block;margin-bottom:7px}
.fi{width:100%;padding:11px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.07);background:#101828;color:#F0F4FF;font-size:14px;outline:none;font-family:'Inter',sans-serif}
.fi-sel{width:100%;padding:11px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.07);background:#101828;color:#F0F4FF;font-size:14px;outline:none;font-family:'Inter',sans-serif}
.fi-sel option{background:#101828}
.btn-full{width:100%;padding:13px;border-radius:100px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:'Inter',sans-serif}
.err{background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.25);border-radius:10px;padding:10px 14px;font-size:13px;color:#FF4D6D;margin-bottom:16px;display:none}
/* DASH */
.dash{display:flex;height:100vh;overflow:hidden}
.sb{width:200px;background:#0C1220;border-right:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;flex-shrink:0}
.sb-logo{padding:16px 14px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-live{font-size:10px;color:#22C55E;margin-top:2px}
.sb-nav{flex:1;padding:10px 7px;display:flex;flex-direction:column;gap:2px}
.ni{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:none;background:transparent;color:rgba(240,244,255,.45);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;text-align:left;width:100%}
.ni.on{background:rgba(255,209,102,.1);color:#FFD166;font-weight:700}
.sb-foot{padding:10px 7px;border-top:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;gap:4px}
.dm{flex:1;overflow:auto;padding:24px}
.dh{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.dt{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:800;margin-bottom:2px}
.ds{font-size:12px;color:rgba(240,244,255,.45)}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.sc{background:#0C1220;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:14px}
.sl{font-size:11px;color:rgba(240,244,255,.45);margin-bottom:5px}
.sn{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:800}
.dc{background:#0C1220;border:1px solid rgba(255,255,255,.07);border-radius:13px;padding:18px;margin-bottom:14px}
.dch{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.dct{font-size:13px;font-weight:700}
.dr{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.07)}
.di{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.dn{font-size:13px;font-weight:600}
.dsub{font-size:11px;color:rgba(240,244,255,.45)}
.ba{background:rgba(34,197,94,.1);color:#22C55E;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700}
.bp{background:rgba(255,209,102,.1);color:#FFD166;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700}
.empty{text-align:center;padding:36px 24px;background:#0C1220;border:1px dashed rgba(255,255,255,.1);border-radius:16px}
/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px}
.mb{background:#0C1220;border:1px solid rgba(255,255,255,.07);border-radius:20px;width:100%;max-width:500px;max-height:90vh;overflow:auto}
.mh{padding:16px 22px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between}
.mt{font-size:15px;font-weight:700}
.mc{background:transparent;border:none;color:rgba(240,244,255,.45);font-size:20px;cursor:pointer}
.mbody{padding:22px}
.to{display:flex;align-items:center;gap:12px;padding:12px 14px;border:2px solid rgba(255,255,255,.07);border-radius:12px;cursor:pointer;margin-bottom:8px;transition:all .15s}
.to.sel-b{border-color:#4DA6FF;background:rgba(77,166,255,.08)}
.to.sel-g{border-color:#FFD166;background:rgba(255,209,102,.08)}
.sel-p{border-color:#A78BFA;background:rgba(167,139,250,.08)}
.to.sel-e{border-color:#22C55E;background:rgba(34,197,94,.08)}
.tpl{padding:10px 12px;border:2px solid rgba(255,255,255,.07);border-radius:10px;cursor:pointer;font-size:12px;line-height:1.7;color:rgba(240,244,255,.55);margin-bottom:7px}
.tpl.sel{border-color:#FFD166;background:rgba(255,209,102,.08);color:#F0F4FF}
.ta{width:100%;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.07);background:#101828;color:#F0F4FF;font-size:12px;resize:vertical;outline:none;font-family:'Inter',sans-serif;line-height:1.6}
/* ONBOARD */
.ob{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:#080D18}
.stbar{display:flex;background:#0C1220;border-radius:100px;padding:4px;border:1px solid rgba(255,255,255,.07);flex-wrap:wrap;justify-content:center;margin-bottom:26px}
.sp{padding:6px 12px;border-radius:100px;font-size:11px;font-weight:700;white-space:nowrap}
.sp.on{background:#FFD166;color:#080D18}
.sp.dn{color:#22C55E}
.sp.pd{color:rgba(255,255,255,.3)}
.ob-card{width:100%;max-width:560px;background:#0C1220;border:1px solid rgba(255,255,255,.07);border-radius:22px;padding:28px}
.bg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:20px}
.bc{padding:14px;border:2px solid rgba(255,255,255,.07);border-radius:13px;cursor:pointer;transition:all .15s}
.bc.on{border-color:#FFD166}
.gc{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;max-height:280px;overflow-y:auto}
.gcard{padding:10px;border:2px solid rgba(255,255,255,.07);border-radius:11px;cursor:pointer;text-align:center;position:relative;transition:all .15s}
.gcard.on{border-color:#FFD166;background:rgba(255,209,102,.08)}
.tl{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
.ti{display:flex;align-items:center;gap:10px;padding:11px 13px;border:2px solid rgba(255,255,255,.07);border-radius:11px;cursor:pointer;transition:all .15s}
.ti.on{border-color:#FFD166;background:rgba(255,209,102,.08)}
.tk{width:17px;height:17px;border-radius:4px;border:2px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;font-weight:700;color:#080D18}
.ti.on .tk{background:#FFD166;border-color:#FFD166}
.conn-box{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:13px;padding:16px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
/* ROI */
.roi{min-height:100vh;background:#080D18}
.roi-hd{padding:14px 32px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;background:#0C1220;position:sticky;top:0;z-index:10}
.roi-body{max-width:860px;margin:0 auto;padding:32px 20px}
.btg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.btc{padding:20px;border:1.5px solid rgba(255,255,255,.07);border-radius:16px;cursor:pointer;background:#0C1220;text-align:center;transition:all .2s}
.btc:hover{border-color:rgba(255,209,102,.3)}
.rc{background:#0C1220;border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:28px;max-width:540px;margin:0 auto}
.sl-row{margin-bottom:18px}
.sl-lr{display:flex;justify-content:space-between;margin-bottom:4px}
.sl-l{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;position:relative}
.sl-v{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:800}
.info-dot{width:16px;height:16px;border-radius:50%;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.06);color:rgba(240,244,255,.65);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;cursor:pointer;line-height:1;position:relative;flex-shrink:0}
.info-dot:hover,.info-dot:focus{background:rgba(255,209,102,.16);border-color:rgba(255,209,102,.45);color:#FFD166;outline:none}
.info-dot::after{content:attr(data-tip);position:absolute;left:50%;bottom:calc(100% + 9px);transform:translateX(-50%);width:220px;background:#101828;border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:9px 10px;color:rgba(240,244,255,.78);font-size:11px;font-weight:500;line-height:1.5;text-transform:none;letter-spacing:0;text-align:left;box-shadow:0 12px 36px rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .15s ease;z-index:20}
.info-dot::before{content:"";position:absolute;left:50%;bottom:calc(100% + 4px);transform:translateX(-50%) rotate(45deg);width:9px;height:9px;background:#101828;border-right:1px solid rgba(255,255,255,.12);border-bottom:1px solid rgba(255,255,255,.12);opacity:0;transition:opacity .15s ease;z-index:21}
.info-dot:hover::after,.info-dot:hover::before,.info-dot:focus::after,.info-dot:focus::before{opacity:1}
.roi-pr{border-radius:12px;padding:14px;margin-bottom:16px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;text-align:center}
.rg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.rcard{border-radius:14px;padding:18px;text-align:center;border:1px solid}
.rv{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:800;margin-bottom:4px}
input[type=range]{-webkit-appearance:none;height:4px;border-radius:2px;background:rgba(255,255,255,.1);outline:none;cursor:pointer;width:100%}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;cursor:pointer;background:#FFD166}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
select option{background:#101828}
.pro-icon{width:30px;height:30px;border-radius:8px;border:1px solid rgba(255,255,255,.12);display:inline-flex;align-items:center;justify-content:center;background:rgba(255,255,255,.045);color:#FFD166;font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;line-height:1;vertical-align:middle;box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
.pro-icon.sm{width:22px;height:22px;border-radius:6px;font-size:9px}
.pro-icon.lg{width:40px;height:40px;border-radius:10px;font-size:13px}
.pro-icon.blue{color:#4DA6FF;border-color:rgba(77,166,255,.25);background:rgba(77,166,255,.08)}
.pro-icon.green{color:#22C55E;border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.08)}
.pro-icon.gold{color:#FFD166;border-color:rgba(255,209,102,.25);background:rgba(255,209,102,.08)}
.pro-icon.red{color:#FF4D6D;border-color:rgba(255,77,109,.25);background:rgba(255,77,109,.08)}
.pro-note{display:inline-flex;align-items:center;gap:7px}
@media (max-width: 900px){
  nav{padding:12px 16px;gap:12px;align-items:flex-start}
  nav>div:last-child{flex-wrap:wrap;justify-content:flex-end;gap:8px}
  .hero{padding:56px 18px 42px}
  .sec{padding:48px 18px}
  .g4,.g3,.btg{grid-template-columns:repeat(2,minmax(0,1fr));max-width:640px}
  .g2{grid-template-columns:1fr;max-width:640px}
  .plan.pop,.tc.pop{transform:none}
  .dash{height:auto;min-height:100vh;display:block;overflow:visible}
  .sb{width:100%;position:sticky;top:0;z-index:80;border-right:none;border-bottom:1px solid rgba(255,255,255,.07)}
  .sb-logo{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px}
  .sb-nav{display:grid;grid-template-columns:repeat(3,1fr);padding:8px;gap:6px}
  .sb-foot{display:grid;grid-template-columns:1fr 1fr;padding:8px}
  .dm{padding:18px}
  .sg{grid-template-columns:repeat(2,1fr)}
  .dh{align-items:flex-start;gap:12px}
  .notif{display:none}
  .foot-top{align-items:flex-start;flex-direction:column}.foot-grid{grid-template-columns:1fr 1fr;gap:18px}
}
@media (max-width: 560px){
  nav{position:relative;display:block}
  nav>div:last-child{margin-top:10px;display:grid!important;grid-template-columns:1fr 1fr}
  nav .btn{width:100%;padding:10px 12px}
  .logo-text{font-size:15px}
  h1{font-size:40px;letter-spacing:-1px}
  .sub{font-size:14px;line-height:1.65}
  .input-row{display:grid;grid-template-columns:1fr;width:100%;max-width:340px;margin-left:auto;margin-right:auto}
  .email-inp{width:100%}
  .g4,.g3,.btg,.bg,.gc{grid-template-columns:1fr!important}
  .card,.card-s,.tc,.plan,.dc,.rc,.auth-card,.ob-card{border-radius:14px;padding:16px}

function _days(dateStr){
  if(!dateStr) return null;
  var t=new Date(dateStr).getTime();
  if(isNaN(t)) return null;
  return Math.floor((Date.now()-t)/86400000);
}
function loyaltyScore(c, ctx){
  ctx=ctx||{};
  var churnDays=ctx.churnDays||60;
  var bizAvgSpend=ctx.bizAvgSpend||500;
  var bizAvgVisits=ctx.bizAvgVisits||5;
  // satisfaction_score = MOST RECENT rating. prev_satisfaction_score = the one before it.
  var sat=c.satisfaction_score||0;
  var prevSat=c.prev_satisfaction_score||0;
  var recovered=(prevSat>0&&prevSat<=2&&sat>=4); // unhappy then came back happy
  var spend=c.total_spent||0;
  var visits=c.visits||c.order_count||0;
  var sinceVisit=_days(c.last_visit_at||c.last_order_at);
  if(sinceVisit===null) sinceVisit=churnDays;

  var spendNorm=Math.min(spend/(bizAvgSpend*2),1)*100;
  var freqNorm=Math.min(visits/(bizAvgVisits*2),1)*100;
  var recencyNorm=Math.max(0,1-(sinceVisit/churnDays))*100;

  var score=Math.round(spendNorm*0.33 + recencyNorm*0.34 + freqNorm*0.33);
  // Recovered customers get a loyalty bump — they felt heard and chose to return
  if(recovered) score=Math.min(100,score+10);

  var highValue=(spendNorm>=60||freqNorm>=60);
  var slipping=(sinceVisit>=churnDays);

  // Block ONLY on the latest rating being low. A past 2 that's now a 5 does NOT block.
  if(sat>0&&sat<=2)
    return {score:score, tier:"At risk", gift:"none", reason:"low_rating", slipping:slipping, highValue:highValue, sat:sat, sinceVisit:sinceVisit, recovered:false};

  // Recovered customer (2→5): treat as a top loyalty win, send a gift to reinforce
  if(recovered&&!slipping)
    return {score:score, tier:"Recovered ★", gift:"physical", reason:"recovered", slipping:false, highValue:highValue, sat:sat, sinceVisit:sinceVisit, recovered:true};

  if(slipping){
    if(highValue) return {score:score, tier:"Win-back VIP", gift:"physical", reason:"churn_highvalue", slipping:true, highValue:true, sat:sat, sinceVisit:sinceVisit, recovered:recovered};
    if(spendNorm>=30||freqNorm>=30) return {score:score, tier:"Win-back", gift:"digital", reason:"churn_mid", slipping:true, highValue:false, sat:sat, sinceVisit:sinceVisit, recovered:recovered};
    return {score:score, tier:"Drifting", gift:"alert", reason:"churn_lowvalue", slipping:true, highValue:false, sat:sat, sinceVisit:sinceVisit, recovered:recovered};
  }

  if(score>=75) return {score:score, tier:"Loyal", gift:"physical", reason:"loyal", slipping:false, highValue:highValue, sat:sat, sinceVisit:sinceVisit, recovered:recovered};
  if(score>=50) return {score:score, tier:"Regular", gift:"digital", reason:"regular", slipping:false, highValue:highValue, sat:sat, sinceVisit:sinceVisit, recovered:recovered};
  return {score:score, tier:"Building", gift:"message", reason:"building", slipping:false, highValue:highValue, sat:sat, sinceVisit:sinceVisit, recovered:recovered};
}

// -- CSRF state helpers (stored in sessionStorage so it survives redirects) --
function savePlatformState(platform,state,extra){
  sessionStorage.setItem("ct_oauth_state",JSON.stringify({platform,state,...extra}));
}
function loadPlatformState(){
  try{return JSON.parse(sessionStorage.getItem("ct_oauth_state")||"null");}catch{return null;}
}
function clearPlatformState(){sessionStorage.removeItem("ct_oauth_state");}

// -- Generate a random state token client-side --------------------------------
function randomState(){
  const arr=new Uint8Array(24);crypto.getRandomValues(arr);
  return Array.from(arr,b=>b.toString(16).padStart(2,"0")).join("");
}

// -- Store state in Supabase then return it -----------------------------------
async function createOAuthState(platform,metadata){
  const state=randomState();
  // Only persist to DB when the user is logged in -- sessionStorage covers the unauthenticated onboard flow
  if(S?.user?.id){
    try{
      const tok=S.token;
      await fetch(`${SU}/rest/v1/oauth_states`,{
        method:"POST",
        headers:{...h(tok),Prefer:"return=minimal"},
        body:JSON.stringify({state,user_id:S.user.id,platform,metadata,expires_at:new Date(Date.now()+10*60*1000).toISOString()})
      });
    }catch(e){console.warn("Could not persist state to DB",e);}
  }
  savePlatformState(platform,state,metadata||{});
  return state;
}

// Edge functions redirect to: goclicktide.com?ct_platform=square&ct_merchant=xxx&ct_name=Yyy
// or on error: goclicktide.com?ct_error=...
(function handleOAuthReturn(){
  const params=new URLSearchParams(window.location.search);

  // Stripe redirect
  if(params.get("session")==="success"){
    const plan=saveSelectedPlan(params.get("plan")||"Growth");
    const biz=params.get("biz")||"";
    obCampaignSkipped=params.get("campaign")==="skip";
    obN=biz;obS=6;scr="onboard";
    history.replaceState({},"",window.location.pathname);
    return;
  }
  if(params.get("session")==="cancelled"){
    history.replaceState({},"",window.location.pathname);
    return;
  }

  // OAuth success redirect from Edge Function
  if(params.get("ct_platform")){
    const platform=params.get("ct_platform");
    const merchantId=params.get("ct_merchant")||"";
    const merchantName=params.get("ct_name")||platform;
    const stored=loadPlatformState();
    const returnTo=sessionStorage.getItem("ct_return")||"";
    clearPlatformState();
    sessionStorage.removeItem("ct_return");
    // Set the connection in state
    platConn[platform]={merchant_id:merchantId,merchant_name:decodeURIComponent(merchantName)};
    // If we were mid-onboard, mark connected and jump to step 2 (gift)
    if(stored&&obS<=1&&!returnTo){obP=platform;obC=true;obS=2;scr="onboard";}
    else{scr="dash";dpg="settings";}
    history.replaceState({},"",window.location.pathname);
    return;
  }

  // OAuth error redirect from Edge Function
  if(params.get("ct_error")){
    const msg=decodeURIComponent(params.get("ct_error")||"Connection failed");
    clearPlatformState();
    history.replaceState({},"",window.location.pathname);
    alert("Platform connection failed: "+msg+"\n\nPlease try again.");
  }
})();

function handleLogoUpload(input){
  if(!input.files||!input.files[0])return;
  var file=input.files[0];

  // Validate size
  var maxSize=file.name.endsWith('.svg')?20*1024*1024:100*1024*1024;
  if(file.size>maxSize){alert('File too large. Max size: '+(file.name.endsWith('.svg')?'20MB':'100MB'));return;}

  obLogoName=file.name;
  obLogoFile=file;

  // Preview immediately
  var reader=new FileReader();
  reader.onload=function(e){
    obLogoUrl=e.target.result;
    R();
    // Upload to Supabase Storage in background
    uploadLogoToStorage(file);
  };
  reader.readAsDataURL(file);
}

async function uploadLogoToStorage(file){
  try{
    const ext=file.name.split('.').pop();
    const path=`logos/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
    const res=await fetch(`${SU}/storage/v1/object/logos/${path}`,{
      method:'POST',
      headers:{apikey:SK,Authorization:`Bearer ${S?.token||SK}`,'Content-Type':file.type,'Cache-Control':'3600'},
      body:file
    });
    if(res.ok){
      obLogoStorageUrl=`${SU}/storage/v1/object/public/logos/${path}`;
      // Refresh logo section to show "Saved" indicator
      var logoZone=document.getElementById('logoDropZone');
      if(!logoZone)R(); // full re-render if not found
    }
  }catch(e){console.warn('Logo storage upload failed:',e);}
}

function handleCSV(input){
  if(!input.files||!input.files[0])return;
  var file=input.files[0];
  var reader=new FileReader();
  reader.onload=function(e){
    var lines=e.target.result.split('\n');
    var headers=lines[0].split(',').map(function(h){return h.trim().toLowerCase();});
    var nameIdx=headers.findIndex(function(h){return h.includes('name');});
    var emailIdx=headers.findIndex(function(h){return h.includes('email');});
    if(nameIdx===-1||emailIdx===-1){alert('CSV must have a Name and Email column.');return;}
    var imported=0;
    var tok=S?S.token:SK;
    var promises=[];
    for(var i=1;i<Math.min(lines.length,501);i++){
      var cols=lines[i].split(',');
      if(cols[emailIdx]&&cols[emailIdx].includes('@')){
        promises.push(db.ins('customers',{name:(cols[nameIdx]||'').trim(),email:(cols[emailIdx]||'').trim(),status:'active',user_id:myId()},tok));
        imported++;
      }
    }
    Promise.all(promises).then(function(){
      alert('Successfully imported '+imported+' customers!');
      obImport='platform';
      R();
    }).catch(function(e){alert('Import error: '+e.message);});
  };
  reader.readAsText(file);
}

async function tCmp(id,st){if(st!=="active"&&!await requirePaidAction())return;await db.upd("campaigns",id,{status:st==="active"?"paused":"active"},S?.token||SK);dLoad();}
async function dCmp(id){if(!confirm("Delete?"))return;await db.del("campaigns",id,S?.token||SK);dLoad();}
async function dOut(){try{if(S?.token)await au.out(S.token);}catch{}S=null;localStorage.removeItem("ct");localStorage.removeItem("cu");go("land");}

// Connect a platform from the Settings page (stores where to return)
async function connectPlatformDash(platform){
  sessionStorage.setItem("ct_return","settings");
  if(platform==="square")await squareConnect();
  else if(platform==="shopify")await shopifyConnect();
  else if(platform==="clover")await cloverConnect();
  else if(platform==="stripe")stripeConnect();
  else if(platform==="toast")toastConnect();
  else if(platform==="mindbody")mindbodyConnect();
}

// Disconnect (mark inactive in DB)
async function disconnectPlatform(platform){
  if(!confirm(`Disconnect ${platform}? Campaigns using it will be paused.`))return;
  const tok=S?.token||SK;
  try{
    await fetch(`${SU}/rest/v1/platform_connections?platform=eq.${platform}`,{
      method:"PATCH",
      headers:{...h(tok),Prefer:"return=minimal"},
      body:JSON.stringify({is_active:false})
    });
    platConn[platform]=false;
    dLoad();
  }catch(ex){alert("Failed to disconnect: "+ex.message);}
}

// -- Send a physical gift -----------------------------------------------------
async function sendPhysicalGift({campaignId,customerName,customerEmail,address,giftIndex,gift:giftInput,logoUrl,businessName,giftCost}){
  const gift=giftInput||giftOptions()[giftIndex]||PRINTIFY_CATALOG[giftIndex];
  if(!gift){console.error("Invalid gift option");return;}
  const cost=Number(giftCost||gift.cost||gift.p||gift.estimated_cost||0);

  const res=await fetch(`${FN}/printify-fulfill-gift`,{
    method:"POST",
    headers:{"Content-Type":"application/json",apikey:SK,Authorization:`Bearer ${S?.token||SK}`},
    body:JSON.stringify({
      campaign_id:campaignId,
      user_id:myId(),
      merchant_id:myId(),
      gift_cost:cost,
      customer_name:customerName,
      customer_email:customerEmail,
      address,
      printify_product_id:gift.printify_product_id||gift.id,
      printify_variant_id:gift.printify_variant_id||gift.variant_id,
      logo_url:logoUrl||null,
      business_name:businessName||"",
      gift_name:gift.n,
    })
  });

  const data=await res.json();
  if(!res.ok){throw new Error(data.error||"Gift fulfillment failed");}
  return data;

var _ctDx=0,_ctDy=24,_ctDragging=false,_ctDragMoved=false,_ctDragSX,_ctDragSY,_ctDragOX,_ctDragOY;
function _ctDrag_click(e){if(!_ctDragMoved)_ctToggle();}

  var wrap=document.getElementById('ctWrap');

document.addEventListener('mousemove',function(e){

  _ctDx=Math.max(8,Math.min(window.innerWidth-64,_ctDragOX+dx));

  if(wrap){wrap.style.left=_ctDx+'px';wrap.style.bottom=_ctDy+'px';}
  var w=document.getElementById('ctWindow');
