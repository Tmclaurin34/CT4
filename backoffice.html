<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Clicktide Back Office</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080D18;color:#F0F4FF;font-family:Inter,sans-serif}
button,input,textarea{font-family:Inter,sans-serif}
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#0C1220;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:18px}
.login .card{width:min(420px,100%)}
.logo{font-family:"Space Grotesk",sans-serif;font-size:22px;font-weight:800;letter-spacing:.08em;margin-bottom:8px}
.muted{color:rgba(240,244,255,.5);font-size:13px;line-height:1.6}
.field{margin-top:14px}.label{font-size:11px;font-weight:800;color:rgba(240,244,255,.48);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
.input,.textarea{width:100%;background:#101828;border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#F0F4FF;padding:12px 13px;font-size:14px;outline:none}
.textarea{min-height:92px;resize:vertical}
.btn{border:0;border-radius:999px;padding:10px 16px;font-weight:800;cursor:pointer}
.gold{background:#FFD166;color:#080D18}.ghost{background:rgba(255,255,255,.07);color:#F0F4FF;border:1px solid rgba(255,255,255,.1)}
.danger{background:rgba(255,77,109,.1);color:#FF4D6D;border:1px solid rgba(255,77,109,.25)}
.err{display:none;margin-top:12px;color:#FF6B6B;font-size:13px;line-height:1.5}
.app{display:grid;grid-template-columns:320px 1fr;min-height:100vh}
.side{border-right:1px solid rgba(255,255,255,.07);background:#0A1020;padding:18px;position:sticky;top:0;height:100vh;overflow:auto}
.main{padding:22px;overflow:auto}
.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px}
.title{font-family:"Space Grotesk",sans-serif;font-size:26px;font-weight:800}
.client{padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,.07);margin-bottom:9px;cursor:pointer;background:rgba(255,255,255,.02)}
.client.on{border-color:rgba(255,209,102,.45);background:rgba(255,209,102,.08)}
.name{font-size:13px;font-weight:800;margin-bottom:4px}
.email{font-size:12px;color:rgba(240,244,255,.45);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.stat{background:#0C1220;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px}
.stat small{display:block;color:rgba(240,244,255,.45);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.stat b{font-family:"Space Grotesk",sans-serif;font-size:28px;color:#FFD166}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.tab{padding:8px 13px}.tab.on{background:#FFD166;color:#080D18}
.row{display:grid;grid-template-columns:1.1fr 1.2fr .8fr .8fr;gap:10px;align-items:center;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.07);font-size:13px}
.row.head{font-size:10px;color:rgba(240,244,255,.35);font-weight:800;text-transform:uppercase;letter-spacing:.08em}
.pill{display:inline-flex;border-radius:999px;padding:5px 9px;background:rgba(77,166,255,.1);color:#80BFFF;font-size:11px;font-weight:800}
.ok{color:#22C55E}.warn{color:#FFD166}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.catalog-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.gift{background:#0C1220;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px;display:grid;gap:10px}
.gift-img{width:56px;height:56px;border-radius:12px;background:#101828;border:1px solid rgba(255,255,255,.08);object-fit:cover}
@media(max-width:900px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.grid{grid-template-columns:1fr 1fr}.row{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const SU="https://hmihfncvahsdlmefyxyg.supabase.co";
const SK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhtaWhmbmN2YWhzZGxtZWZ5eHlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1OTgzNDksImV4cCI6MjA5NjE3NDM0OX0.GP-4tYnKlNP9iSklJyXCSatz3I7gtQQJz7xOUQdXKWk";
const h=(t)=>({apikey:SK,Authorization:`Bearer ${t||SK}`,"Content-Type":"application/json"});
const FN=`${SU}/functions/v1`;
let S=null, staff=null, clients=[], active=null, tab="overview";
try{S={token:localStorage.getItem("ct_bo"),user:JSON.parse(localStorage.getItem("ct_bou")||"null")};if(!S.token)S=null;}catch{S=null}
const esc=v=>String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]));
async function api(path,opt={}){const r=await fetch(path,{...opt,headers:{...h(S?.token),...(opt.headers||{})}});const d=await r.json().catch(()=>null);if(!r.ok)throw new Error(d?.message||d?.error||"Request failed");return d;}
async function signIn(){const e=document.getElementById("email").value,p=document.getElementById("pw").value,err=document.getElementById("err");err.style.display="none";try{const r=await fetch(`${SU}/auth/v1/token?grant_type=password`,{method:"POST",headers:{apikey:SK,"Content-Type":"application/json"},body:JSON.stringify({email:e,password:p})});const d=await r.json();if(d.error)throw new Error(d.error.message);S={token:d.access_token,user:d.user};localStorage.setItem("ct_bo",S.token);localStorage.setItem("ct_bou",JSON.stringify(S.user));await load();}catch(ex){err.textContent=ex.message;err.style.display="block";}}
function signOut(){localStorage.removeItem("ct_bo");localStorage.removeItem("ct_bou");S=null;staff=null;clients=[];active=null;render();}
function login(){return `<div class="login"><div class="card"><div class="logo">CLICK<span style="color:#4DA6FF">TIDE</span></div><div class="title" style="font-size:22px;margin-bottom:4px">Back Office</div><div class="muted">For Clicktide admins, support staff, and approved partners only.</div><div class="field"><div class="label">Email</div><input class="input" id="email" type="email"></div><div class="field"><div class="label">Password</div><input class="input" id="pw" type="password" onkeydown="if(event.key==='Enter')signIn()"></div><button class="btn gold" style="width:100%;margin-top:18px" onclick="signIn()">Log in</button><div id="err" class="err"></div></div></div>`}
async function load(){if(!S){render();return}try{const st=await api(`${SU}/rest/v1/clicktide_staff?select=role,is_active&user_id=eq.${S.user.id}`);staff=Array.isArray(st)?st[0]:null;if(!staff||!staff.is_active)throw new Error("This login is not approved for back office access.");clients=await api(`${SU}/rest/v1/clicktide?select=*&order=created_at.desc`);if(!Array.isArray(clients))clients=[];active=active||clients[0]||null;render();await loadTab();}catch(ex){localStorage.removeItem("ct_bo");localStorage.removeItem("ct_bou");S=null;render(ex.message);}}
function render(message){if(!S){document.getElementById("app").innerHTML=login();if(message){const e=document.getElementById("err");e.textContent=message;e.style.display="block"}return}document.getElementById("app").innerHTML=`<div class="app"><aside class="side"><div class="logo">CLICK<span style="color:#4DA6FF">TIDE</span></div><div class="muted" style="margin-bottom:14px">Back office · ${esc(staff?.role||"")}</div><input class="input" placeholder="Search clients" oninput="filterClients(this.value)" style="margin-bottom:12px"><div id="clientList">${clientList(clients)}</div></aside><main class="main"><div class="top"><div><div class="title">${esc(active?.business_name||"Select a client")}</div><div class="muted">${esc(active?.email||"")}</div></div><div class="actions"><button class="btn ghost" onclick="location.href='/'">Client site</button><button class="btn danger" onclick="signOut()">Log out</button></div></div>${active?mainView():`<div class="card muted">No clients available for this staff account yet.</div>`}</main></div>`}
function clientList(rows){return rows.map(c=>`<div class="client ${active?.user_id===c.user_id?"on":""}" onclick="active=clients.find(x=>x.user_id==='${c.user_id}');tab='overview';render();loadTab()"><div class="name">${esc(c.business_name||"Unnamed business")}</div><div class="email">${esc(c.email||c.user_id)}</div></div>`).join("")||`<div class="muted">No clients found.</div>`}
function filterClients(q){q=q.toLowerCase();document.getElementById("clientList").innerHTML=clientList(clients.filter(c=>String(c.business_name||"").toLowerCase().includes(q)||String(c.email||"").toLowerCase().includes(q)))}
function mainView(){const tabs=["overview","profile","changes","customers","campaigns","shipments","wallet","sms","catalog","connections"];return `<div class="tabs">${tabs.map(t=>`<button class="btn tab ${tab===t?"on":"ghost"}" onclick="tab='${t}';render();loadTab()">${t==="sms"?"SMS":t[0].toUpperCase()+t.slice(1)}</button>`).join("")}</div><div id="panel"><div class="card muted">Loading...</div></div>`}
async function loadTab(){if(!active)return;const p=document.getElementById("panel");if(!p)return;try{if(tab==="overview")return overview(p);if(tab==="profile")return profile(p);if(tab==="changes")return changesPanel(p);if(tab==="customers")return table(p,"customers","name,email,phone,sms_consent,status,total_spent",["Name","Email","Phone","SMS","Status","Spent"]);if(tab==="campaigns")return table(p,"campaigns","name,campaign_type,delivery_channel,status,gift_name",["Name","Type","Channel","Status","Gift"]);if(tab==="shipments")return table(p,"shipments","customer_name,gift,status,campaign",["Customer","Gift","Status","Campaign"]);if(tab==="wallet")return walletPanel(p);if(tab==="sms")return smsPanel(p);if(tab==="catalog")return catalogPanel(p);if(tab==="connections")return table(p,"platform_connections","platform,merchant_name,is_active,connected_at",["Platform","Merchant","Active","Connected"]);}catch(ex){p.innerHTML=`<div class="card warn">${esc(ex.message)}</div>`}}
async function count(t){const rows=await api(`${SU}/rest/v1/${t}?select=id,user_id&user_id=eq.${active.user_id}`);return Array.isArray(rows)?rows.length:0}
async function overview(p){const counts=await Promise.all(["customers","campaigns","shipments","wallet"].map(count));p.innerHTML=`<div class="grid">${[["Customers",counts[0]],["Campaigns",counts[1]],["Shipments",counts[2]],["Wallet rows",counts[3]]].map(x=>`<div class="stat"><small>${x[0]}</small><b>${x[1]}</b></div>`).join("")}</div><div class="card"><div class="name">Support notes</div><div class="muted">Use this page to help onboard clients, inspect setup, troubleshoot campaigns, and confirm integrations. Real test fulfillment should be handled from the internal back office process, not the client dashboard.</div></div>`}
function profile(p){p.innerHTML=`<div class="card"><div class="field"><div class="label">Business name</div><input id="bn" class="input" value="${esc(active.business_name)}"></div><div class="field"><div class="label">Contact name</div><input id="cn" class="input" value="${esc(active.contact_name)}"></div><div class="field"><div class="label">Business email</div><input id="be" class="input" value="${esc(active.business_email||active.email)}"></div><div class="field"><div class="label">Business phone</div><input id="bp" class="input" value="${esc(active.business_phone)}"></div><div class="field"><div class="label">Address</div><input id="ad" class="input" value="${esc(active.address)}"></div><div class="actions"><button class="btn gold" onclick="saveProfile()">Save client profile</button><span id="saveMsg" class="muted"></span></div></div>`}
async function saveProfile(){const g=id=>document.getElementById(id).value;await api(`${SU}/rest/v1/clicktide?user_id=eq.${active.user_id}`,{method:"PATCH",headers:{Prefer:"return=representation"},body:JSON.stringify({business_name:g("bn"),contact_name:g("cn"),business_email:g("be"),business_phone:g("bp"),address:g("ad")})});Object.assign(active,{business_name:g("bn"),contact_name:g("cn"),business_email:g("be"),business_phone:g("bp"),address:g("ad")});document.getElementById("saveMsg").textContent="Saved";}
async function changesPanel(p){const rows=await api(`${SU}/rest/v1/business_profile_changes?select=*&user_id=eq.${active.user_id}&order=created_at.desc&limit=50`);const ch=Array.isArray(rows)?rows:[];const grid="grid-template-columns:1.1fr 2.2fr .7fr 1fr 1.1fr";p.innerHTML=`<div class="card" style="overflow:auto"><div class="name">Business info changes</div><div class="muted" style="margin-bottom:12px">Every profile change the owner requested from the dashboard, the verification channel, and whether it was confirmed with the 6-digit code. Use this when a client asks about a business name or contact change.</div><div class="row head" style="${grid}"><div>When</div><div>Changes</div><div>Status</div><div>Code sent to</div><div>Confirmed</div></div>${ch.length?ch.map(c=>`<div class="row" style="${grid}"><div>${esc(String(c.created_at||"").slice(0,16).replace("T"," "))}</div><div>${Object.entries(c.changes||{}).map(([k,v])=>`<div><b>${esc(k.replace(/_/g," "))}</b>: ${esc(v.from||"—")} → <span class="ok">${esc(v.to||"(cleared)")}</span></div>`).join("")}</div><div><span class="${c.status==="confirmed"?"ok":"warn"}">${esc(c.status)}</span></div><div>${esc(c.sent_to||"")} · ${esc(c.channel||"")}</div><div>${c.confirmed_at?esc(String(c.confirmed_at).slice(0,16).replace("T"," ")):"—"}</div></div>`).join(""):`<div class="muted" style="padding:16px 0">No change requests yet.</div>`}</div>`}
async function table(p,t,select,heads){const rows=await api(`${SU}/rest/v1/${t}?select=${select},user_id&user_id=eq.${active.user_id}&limit=100`);const keys=select.split(",").filter(k=>k!=="user_id");const grid=`grid-template-columns:repeat(${keys.length},minmax(120px,1fr))`;p.innerHTML=`<div class="card" style="overflow:auto"><div class="row head" style="${grid}">${heads.map(h=>`<div>${h}</div>`).join("")}</div>${Array.isArray(rows)&&rows.length?rows.map(r=>`<div class="row" style="${grid}">${keys.map(k=>`<div>${(k==="is_active"||k==="sms_consent")?`<span class="${r[k]?"ok":"warn"}">${r[k]?"Yes":"No"}</span>`:esc(r[k]??"")}</div>`).join("")}</div>`).join(""):`<div class="muted" style="padding:16px 0">No records yet.</div>`}</div>`}
async function smsPanel(p){const rows=await api(`${SU}/rest/v1/sms_messages?select=to_phone,body,status,error,provider_message_id,created_at,user_id&user_id=eq.${active.user_id}&order=created_at.desc&limit=100`);const sms=Array.isArray(rows)?rows:[];const grid="grid-template-columns:1fr 2fr .8fr 1.2fr";p.innerHTML=`<div class="card" style="overflow:auto"><div class="name">SMS messages</div><div class="muted" style="margin-bottom:12px">Twilio text history for this client. Use this to troubleshoot failed campaign texts and confirm consent-based sends.</div><div class="row head" style="${grid}"><div>Phone</div><div>Message</div><div>Status</div><div>Sent</div></div>${sms.length?sms.map(m=>`<div class="row" style="${grid}"><div>${esc(m.to_phone)}</div><div>${esc(String(m.body||"").slice(0,90))}${String(m.body||"").length>90?"...":""}${m.error?`<div class="warn" style="font-size:11px;margin-top:4px">${esc(m.error)}</div>`:""}</div><div><span class="${m.status==="sent"?"ok":"warn"}">${esc(m.status)}</span></div><div>${esc(m.created_at||"")}</div></div>`).join(""):`<div class="muted" style="padding:16px 0">No SMS messages yet.</div>`}</div>`}
async function walletPanel(p){const rows=await api(`${SU}/rest/v1/wallet?select=desc,amount,balance,transaction_type,note,created_at,user_id&user_id=eq.${active.user_id}&order=created_at.desc&limit=100`);const tx=Array.isArray(rows)?rows:[];const bal=Number(tx[0]?.balance||0);const added=tx.filter(t=>Number(t.amount)>0).reduce((a,t)=>a+Number(t.amount||0),0);const spent=tx.filter(t=>Number(t.amount)<0&&t.transaction_type!=="refund").reduce((a,t)=>a+Math.abs(Number(t.amount||0)),0);const refunded=tx.filter(t=>t.transaction_type==="refund").reduce((a,t)=>a+Math.abs(Number(t.amount||0)),0);p.innerHTML=`<div class="grid"><div class="stat"><small>Available</small><b>$${bal.toFixed(2)}</b></div><div class="stat"><small>Added</small><b>$${added.toFixed(2)}</b></div><div class="stat"><small>Spent</small><b>$${spent.toFixed(2)}</b></div><div class="stat"><small>Refunded</small><b>$${refunded.toFixed(2)}</b></div></div><div class="card" style="margin-bottom:14px"><div class="name">Wallet controls</div><div class="muted">Use this when a client has unused gift wallet funds. Issue the money refund in Stripe or your payment processor first, then record it here to reduce the Clicktide wallet balance.</div><div class="actions"><button class="btn danger" onclick="openWalletRefund(${bal})" ${bal<=0?"disabled":""}>Record unused funds refund</button></div></div><div class="card"><div class="row head"><div>Description</div><div>Type</div><div>Amount</div><div>Balance</div></div>${tx.length?tx.map(t=>`<div class="row"><div>${esc(t.desc||"")}</div><div><span class="pill">${esc(t.transaction_type||"adjustment")}</span></div><div class="${Number(t.amount)>=0?"ok":"warn"}">${Number(t.amount)>=0?"+":""}$${Number(t.amount||0).toFixed(2)}</div><div>$${Number(t.balance||0).toFixed(2)}</div></div>${t.note?`<div class="muted" style="padding:0 0 10px 0">${esc(t.note)}</div>`:""}`).join(""):`<div class="muted" style="padding:16px 0">No wallet transactions yet.</div>`}</div>`}
function openWalletRefund(balance){document.body.insertAdjacentHTML("beforeend",`<div class="login" style="position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:50" onclick="if(event.target===this)this.remove()"><div class="card" style="width:min(460px,100%)"><div class="title" style="font-size:22px;margin-bottom:6px">Record wallet refund</div><div class="muted">This lowers the client gift wallet balance. Only use it after you have issued the actual money refund outside Clicktide.</div><div class="field"><div class="label">Current balance</div><input class="input" value="$${Number(balance||0).toFixed(2)}" disabled></div><div class="field"><div class="label">Refund amount</div><input class="input" id="wrAmount" type="number" min="0.01" max="${Number(balance||0)}" step="0.01" placeholder="0.00"></div><div class="field"><div class="label">Reason / payment reference</div><textarea class="textarea" id="wrNote" placeholder="Stripe refund ID, reason, or support note"></textarea></div><div class="actions"><button class="btn danger" onclick="saveWalletRefund(${Number(balance||0)})">Record refund</button><button class="btn ghost" onclick="this.closest('.login').remove()">Cancel</button></div><div id="wrErr" class="err"></div></div></div>`)}
async function saveWalletRefund(balance){const amt=Number(document.getElementById("wrAmount")?.value||0);const note=document.getElementById("wrNote")?.value||"";const err=document.getElementById("wrErr");if(!amt||amt<=0||amt>Number(balance||0)){err.textContent="Enter a refund amount greater than $0 and not more than the current balance.";err.style.display="block";return}try{await api(`${SU}/rest/v1/wallet`,{method:"POST",headers:{Prefer:"return=minimal"},body:JSON.stringify({user_id:active.user_id,desc:"Unused gift wallet refund",amount:-amt,balance:Number(balance||0)-amt,transaction_type:"refund",note,created_by:S.user.id})});document.querySelector(".login[style*='fixed']")?.remove();await loadTab();}catch(ex){err.textContent=ex.message;err.style.display="block"}}
async function catalogPanel(p){const rows=await api(`${SU}/rest/v1/gift_catalog?select=id,name,subtitle,category,image_url,estimated_cost,is_active,is_featured,source,printify_product_id,printify_variant_id&order=is_featured.desc,name.asc`);const gifts=Array.isArray(rows)?rows:[];p.innerHTML=`<div class="card" style="margin-bottom:14px"><div class="top" style="margin-bottom:0"><div><div class="name">Gift catalog</div><div class="muted">Businesses choose from these Clicktide gift options when creating campaigns. Printify stays hidden behind the scenes.</div></div><div class="actions"><button class="btn gold" onclick="syncCatalog()">Sync Printify catalog</button><button class="btn ghost" onclick="openGiftEditor()">Add manual gift</button></div></div><div id="catMsg" class="muted" style="margin-top:10px"></div></div><div class="catalog-grid">${gifts.length?gifts.map(g=>`<div class="gift"><div style="display:flex;gap:11px;align-items:center"><img class="gift-img" src="${esc(g.image_url||"")}" onerror="this.style.display='none'"><div><div class="name">${esc(g.name)}</div><div class="email">${esc(g.subtitle||g.category||"")}</div></div></div><div class="muted">Estimated cost: <strong style="color:#FFD166">$${Number(g.estimated_cost||0).toFixed(2)}</strong> · ${esc(g.category||"general")} · ${esc(g.source||"manual")}</div><div class="actions"><button class="btn ${g.is_active?"ghost":"gold"}" onclick="toggleGift('${g.id}','is_active',${g.is_active?1:0})">${g.is_active?"Active":"Turn on"}</button><button class="btn ${g.is_featured?"gold":"ghost"}" onclick="toggleGift('${g.id}','is_featured',${g.is_featured?1:0})">${g.is_featured?"Featured":"Feature"}</button></div></div>`).join(""):`<div class="card muted">No gift catalog items yet. Sync Printify or add a manual gift.</div>`}</div>`}
async function syncCatalog(){const msg=document.getElementById("catMsg");if(msg)msg.textContent="Syncing Printify products...";try{const d=await api(`${FN}/sync-printify-catalog`,{method:"POST",body:JSON.stringify({})});if(msg)msg.textContent=d.message||`Imported ${d.imported||0} gifts.`;await catalogPanel(document.getElementById("panel"));}catch(ex){if(msg)msg.innerHTML=`<span class="warn">${esc(ex.message)}</span>`;}}
async function toggleGift(id,field,current){await api(`${SU}/rest/v1/gift_catalog?id=eq.${id}`,{method:"PATCH",headers:{Prefer:"return=minimal"},body:JSON.stringify({[field]:!current,updated_at:new Date().toISOString()})});await loadTab();}
function openGiftEditor(){document.body.insertAdjacentHTML("beforeend",`<div class="login" style="position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:50" onclick="if(event.target===this)this.remove()"><div class="card" style="width:min(520px,100%)"><div class="title" style="font-size:22px;margin-bottom:6px">Add gift option</div><div class="muted">Use this for custom gifts you source yourself or products you want to show before they are synced.</div><div class="field"><div class="label">Gift name</div><input class="input" id="geName" placeholder="Branded mug"></div><div class="field"><div class="label">Subtitle</div><input class="input" id="geSub" placeholder="Ceramic 11oz"></div><div class="field"><div class="label">Category</div><input class="input" id="geCat" value="general"></div><div class="field"><div class="label">Estimated cost</div><input class="input" id="geCost" type="number" step="0.01" min="0" placeholder="14.00"></div><div class="field"><div class="label">Image URL</div><input class="input" id="geImg" placeholder="https://..."></div><div class="actions"><button class="btn gold" onclick="saveGift()">Save gift</button><button class="btn ghost" onclick="this.closest('.login').remove()">Cancel</button></div><div id="geErr" class="err"></div></div></div>`)}
async function saveGift(){const g=id=>document.getElementById(id)?.value||"";const err=document.getElementById("geErr");try{await api(`${SU}/rest/v1/gift_catalog`,{method:"POST",headers:{Prefer:"return=minimal"},body:JSON.stringify({name:g("geName"),subtitle:g("geSub"),category:g("geCat")||"general",estimated_cost:Number(g("geCost")||0),image_url:g("geImg")||null,is_active:true,source:"manual"})});document.querySelector(".login[style*='fixed']")?.remove();await loadTab();}catch(ex){err.textContent=ex.message;err.style.display="block"}}
render();if(S)load();
</script>
</body>
</html>
